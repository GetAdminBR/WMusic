<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMusic Admin</title>
    <style>
        :root {
            --bg-1: #0a1220;
            --bg-2: #111a2c;
            --card: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.16);
            --text: #f4f8ff;
            --muted: #b8c8e4;
            --accent: #59c2ff;
            --accent-2: #79e1d1;
            --danger: #ff7da2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at -5% -10%, rgba(89, 194, 255, 0.22), transparent 62%),
                radial-gradient(900px 500px at 110% 0%, rgba(121, 225, 209, 0.18), transparent 58%),
                linear-gradient(170deg, var(--bg-1), var(--bg-2));
        }

        .wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 18px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .title {
            font-size: clamp(20px, 4vw, 30px);
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--card-border);
            background: var(--card);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            border-color: rgba(149, 223, 255, 0.75);
            transform: translateY(-1px);
        }

        .btn.primary {
            background: linear-gradient(145deg, rgba(89, 194, 255, 0.35), rgba(121, 225, 209, 0.22));
            border-color: rgba(149, 223, 255, 0.78);
        }

        .btn.danger {
            background: linear-gradient(145deg, rgba(255, 125, 162, 0.42), rgba(255, 150, 150, 0.28));
            border-color: rgba(255, 180, 203, 0.84);
        }

        .layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 14px;
        }

        .panel {
            border: 1px solid var(--card-border);
            background: var(--card);
            border-radius: 18px;
            padding: 14px;
            backdrop-filter: blur(8px);
        }

        .panel h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .hint {
            margin: 0 0 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .form {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
        }

        .form input,
        .form textarea,
        .form select {
            width: 100%;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
            outline: none;
        }

        .form textarea {
            min-height: 92px;
            resize: vertical;
        }

        .list-toolbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-bottom: 10px;
        }

        .list-toolbar input {
            width: 100%;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-radius: 10px;
            padding: 9px 10px;
        }

        .items {
            max-height: 50vh;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }

        .item {
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 9px;
        }

        .item.hidden {
            opacity: 0.66;
            border-style: dashed;
        }

        .item-head {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: baseline;
            margin-bottom: 7px;
        }

        .item-title {
            font-size: 14px;
            font-weight: 600;
        }

        .item-meta {
            font-size: 12px;
            color: var(--muted);
        }

        .item-controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 7px;
        }

        .item-controls select {
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-radius: 10px;
            padding: 7px 8px;
            font-size: 12px;
        }

        .song-picker {
            border: 1px solid var(--card-border);
            border-radius: 11px;
            background: rgba(255, 255, 255, 0.05);
            max-height: 170px;
            overflow: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .song-picker label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            color: #dce9ff;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .items {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div class="title">WMusic Admin</div>
            <div class="top-actions">
                <a class="btn" href="./index%20(1).html">Открыть сайт</a>
                <button class="btn primary" id="downloadScriptBtn" type="button">Скачать Скрипт</button>
            </div>
        </div>

        <div class="layout">
            <section class="panel">
                <h2>Музыка и разделы</h2>
                <p class="hint">Добавляй треки по ссылке и назначай раздел: <b>Сейчас в тренде</b> или <b>Ваша музыка</b>. Базовые треки можно скрывать/возвращать.</p>

                <form class="form" id="songForm">
                    <input id="songTitle" type="text" placeholder="Название трека" required>
                    <input id="songArtist" type="text" placeholder="Исполнитель" required>
                    <input id="songSrc" type="url" placeholder="Ссылка на аудио (https://...)" required>
                    <input id="songCover" type="url" placeholder="Ссылка на обложку (необязательно)">
                    <textarea id="songLyrics" placeholder="Текст (необязательно)"></textarea>
                    <select id="songSection">
                        <option value="trending">Сейчас в тренде</option>
                        <option value="user">Ваша музыка</option>
                    </select>
                    <button class="btn primary" type="submit">Добавить Трек</button>
                </form>

                <div class="list-toolbar">
                    <input id="songSearch" type="text" placeholder="Поиск по трекам">
                    <button class="btn" id="reloadSongsBtn" type="button">Обновить</button>
                </div>
                <div class="items" id="songsList"></div>
            </section>

            <section class="panel">
                <h2>Артисты</h2>
                <p class="hint">Создавай/редактируй профиль артиста и назначай ему песни из списка.</p>

                <form class="form" id="artistForm">
                    <input id="artistEditId" type="hidden">
                    <input id="artistName" type="text" placeholder="Имя артиста" required>
                    <input id="artistPhoto" type="url" placeholder="Ссылка на фото" required>
                    <input id="artistAlbums" type="text" placeholder="Альбомы через запятую">
                    <div class="song-picker" id="artistSongPicker"></div>
                    <button class="btn primary" id="artistSubmitBtn" type="submit">Сохранить Артиста</button>
                </form>

                <div class="list-toolbar">
                    <input id="artistSearch" type="text" placeholder="Поиск по артистам">
                    <button class="btn" id="resetArtistFormBtn" type="button">Сбросить Форму</button>
                </div>
                <div class="items" id="artistsList"></div>
            </section>
        </div>
    </div>

    <script>
        (function () {
            const DEFAULT_CUSTOM_COVER = 'https://i.postimg.cc/wvvyjCqY/photo-5282871454565341436-c.jpg';
            const ADMIN_ADDED_SONGS_KEY = 'wmusic-admin-added-songs';
            const ARTISTS_STATE_KEY = 'wmusic-artists-state';
            const SONG_SECTION_OVERRIDES_KEY = 'wmusic-song-section-overrides';
            const HIDDEN_SONG_IDS_KEY = 'wmusic-hidden-song-ids';
            const ADMIN_SONG_CATALOG_KEY = 'wmusic-admin-song-catalog';

            const songForm = document.getElementById('songForm');
            const songTitle = document.getElementById('songTitle');
            const songArtist = document.getElementById('songArtist');
            const songSrc = document.getElementById('songSrc');
            const songCover = document.getElementById('songCover');
            const songLyrics = document.getElementById('songLyrics');
            const songSection = document.getElementById('songSection');
            const songSearch = document.getElementById('songSearch');
            const reloadSongsBtn = document.getElementById('reloadSongsBtn');
            const songsList = document.getElementById('songsList');

            const artistForm = document.getElementById('artistForm');
            const artistEditId = document.getElementById('artistEditId');
            const artistName = document.getElementById('artistName');
            const artistPhoto = document.getElementById('artistPhoto');
            const artistAlbums = document.getElementById('artistAlbums');
            const artistSongPicker = document.getElementById('artistSongPicker');
            const artistSubmitBtn = document.getElementById('artistSubmitBtn');
            const artistSearch = document.getElementById('artistSearch');
            const resetArtistFormBtn = document.getElementById('resetArtistFormBtn');
            const artistsList = document.getElementById('artistsList');
            const downloadScriptBtn = document.getElementById('downloadScriptBtn');

            function loadJson(key, fallback) {
                try {
                    const raw = localStorage.getItem(key);
                    if (!raw) return fallback;
                    const parsed = JSON.parse(raw);
                    return parsed ?? fallback;
                } catch {
                    return fallback;
                }
            }

            function saveJson(key, value) {
                localStorage.setItem(key, JSON.stringify(value));
            }

            function normalizeName(name) {
                return String(name || '').toLowerCase().replace(/\s+/g, ' ').trim();
            }

            function getCatalog() {
                const catalog = loadJson(ADMIN_SONG_CATALOG_KEY, []);
                return Array.isArray(catalog) ? catalog : [];
            }

            function getAdminAddedSongs() {
                const items = loadJson(ADMIN_ADDED_SONGS_KEY, []);
                return Array.isArray(items) ? items : [];
            }

            function getArtistsState() {
                const items = loadJson(ARTISTS_STATE_KEY, []);
                return Array.isArray(items) ? items : [];
            }

            function getSectionOverrides() {
                const map = loadJson(SONG_SECTION_OVERRIDES_KEY, {});
                return map && typeof map === 'object' ? map : {};
            }

            function getHiddenIds() {
                const ids = loadJson(HIDDEN_SONG_IDS_KEY, []);
                return Array.isArray(ids) ? ids.map(String) : [];
            }

            function ensureCatalog() {
                const catalog = getCatalog();
                const adminSongs = getAdminAddedSongs();
                let changed = false;

                for (const song of adminSongs) {
                    if (!song || !song.id) continue;
                    if (catalog.some((x) => x.id === song.id)) continue;
                    catalog.push({
                        id: String(song.id),
                        title: String(song.title || ''),
                        artist: String(song.artist || ''),
                        isCustom: false,
                        isAdminAdded: true
                    });
                    changed = true;
                }

                if (changed) {
                    saveJson(ADMIN_SONG_CATALOG_KEY, catalog);
                }
                return catalog;
            }

            function getTrackByIdFromCatalog(trackId) {
                return ensureCatalog().find((song) => song.id === trackId) || null;
            }

            function renderSongPicker(selectedTitles) {
                const selected = new Set((selectedTitles || []).map(normalizeName));
                const catalog = ensureCatalog();

                if (!catalog.length) {
                    artistSongPicker.innerHTML = '<div class="item-meta">Список песен пока пуст. Открой основной сайт один раз, затем обнови страницу.</div>';
                    return;
                }

                artistSongPicker.innerHTML = catalog
                    .sort((a, b) => a.title.localeCompare(b.title, 'ru'))
                    .map((song) => {
                        const checked = selected.has(normalizeName(song.title)) ? 'checked' : '';
                        return '<label><input type="checkbox" value="' + song.id + '" ' + checked + '> <span>' + song.title + ' - ' + song.artist + '</span></label>';
                    })
                    .join('');
            }

            function getSelectedSongTitlesFromPicker() {
                return [...artistSongPicker.querySelectorAll('input[type="checkbox"]:checked')]
                    .map((input) => getTrackByIdFromCatalog(input.value))
                    .filter(Boolean)
                    .map((song) => song.title);
            }

            function renderSongs() {
                const query = normalizeName(songSearch.value);
                const catalog = ensureCatalog().slice().sort((a, b) => a.title.localeCompare(b.title, 'ru'));
                const sectionOverrides = getSectionOverrides();
                const hiddenIds = new Set(getHiddenIds());

                const filtered = catalog.filter((song) => {
                    return normalizeName(song.title).includes(query) || normalizeName(song.artist).includes(query);
                });

                if (!filtered.length) {
                    songsList.innerHTML = '<div class="item"><div class="item-meta">Ничего не найдено.</div></div>';
                    return;
                }

                songsList.innerHTML = filtered.map((song) => {
                    const hidden = hiddenIds.has(song.id);
                    const section = sectionOverrides[song.id] || (song.isCustom ? 'user' : 'trending');
                    const actionLabel = hidden ? 'Вернуть' : (song.isAdminAdded ? 'Удалить' : 'Скрыть');
                    const actionType = hidden ? 'restore' : (song.isAdminAdded ? 'delete' : 'hide');
                    const typeLabel = song.isCustom ? 'ваш файл' : (song.isAdminAdded ? 'добавлен в админке' : 'базовый');

                    return '<div class="item ' + (hidden ? 'hidden' : '') + '">' +
                        '<div class="item-head"><div class="item-title">' + song.title + '</div><div class="item-meta">' + song.artist + '</div></div>' +
                        '<div class="item-meta">Тип: ' + typeLabel + '</div>' +
                        '<div class="item-controls">' +
                            '<select data-song-section="' + song.id + '" ' + (hidden ? 'disabled' : '') + '>' +
                                '<option value="trending" ' + (section === 'trending' ? 'selected' : '') + '>Сейчас в тренде</option>' +
                                '<option value="user" ' + (section === 'user' ? 'selected' : '') + '>Ваша музыка</option>' +
                            '</select>' +
                            '<button class="btn ' + (actionType === 'delete' ? 'danger' : '') + '" type="button" data-song-action="' + actionType + '" data-song-id="' + song.id + '">' + actionLabel + '</button>' +
                        '</div>' +
                    '</div>';
                }).join('');

                songsList.querySelectorAll('[data-song-section]').forEach((select) => {
                    select.addEventListener('change', () => {
                        const songId = select.dataset.songSection;
                        const section = select.value === 'user' ? 'user' : 'trending';
                        const sectionOverrides = getSectionOverrides();
                        const hiddenIds = new Set(getHiddenIds());

                        sectionOverrides[songId] = section;
                        hiddenIds.delete(songId);
                        saveJson(SONG_SECTION_OVERRIDES_KEY, sectionOverrides);
                        saveJson(HIDDEN_SONG_IDS_KEY, [...hiddenIds]);
                        renderSongs();
                    });
                });

                songsList.querySelectorAll('[data-song-action]').forEach((button) => {
                    button.addEventListener('click', () => {
                        const songId = button.dataset.songId;
                        const action = button.dataset.songAction;
                        const hiddenIds = new Set(getHiddenIds());
                        const sectionOverrides = getSectionOverrides();

                        if (action === 'restore') {
                            hiddenIds.delete(songId);
                            saveJson(HIDDEN_SONG_IDS_KEY, [...hiddenIds]);
                            renderSongs();
                            return;
                        }

                        if (action === 'hide') {
                            hiddenIds.add(songId);
                            saveJson(HIDDEN_SONG_IDS_KEY, [...hiddenIds]);
                            renderSongs();
                            return;
                        }

                        if (action === 'delete') {
                            const adminSongs = getAdminAddedSongs().filter((song) => song.id !== songId);
                            const catalog = ensureCatalog().filter((song) => song.id !== songId);

                            delete sectionOverrides[songId];
                            hiddenIds.delete(songId);

                            saveJson(ADMIN_ADDED_SONGS_KEY, adminSongs);
                            saveJson(ADMIN_SONG_CATALOG_KEY, catalog);
                            saveJson(SONG_SECTION_OVERRIDES_KEY, sectionOverrides);
                            saveJson(HIDDEN_SONG_IDS_KEY, [...hiddenIds]);

                            renderSongs();
                            renderSongPicker();
                            renderArtists();
                        }
                    });
                });
            }

            function renderArtists() {
                const query = normalizeName(artistSearch.value);
                const artists = getArtistsState().slice().sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'ru'));
                const filtered = artists.filter((artist) => normalizeName(artist.name).includes(query));

                if (!filtered.length) {
                    artistsList.innerHTML = '<div class="item"><div class="item-meta">Артистов пока нет.</div></div>';
                    return;
                }

                artistsList.innerHTML = filtered.map((artist) => {
                    const songsCount = Array.isArray(artist.popularSongs) ? artist.popularSongs.length : 0;
                    return '<div class="item">' +
                        '<div class="item-head"><div class="item-title">' + artist.name + '</div><div class="item-meta">' + songsCount + ' песен</div></div>' +
                        '<div class="item-controls">' +
                            '<button class="btn" type="button" data-artist-action="edit" data-artist-id="' + artist.id + '">Редактировать</button>' +
                            '<button class="btn danger" type="button" data-artist-action="delete" data-artist-id="' + artist.id + '">Удалить</button>' +
                        '</div>' +
                    '</div>';
                }).join('');

                artistsList.querySelectorAll('[data-artist-action]').forEach((button) => {
                    button.addEventListener('click', () => {
                        const artistId = button.dataset.artistId;
                        const action = button.dataset.artistAction;
                        const artists = getArtistsState();
                        const target = artists.find((artist) => artist.id === artistId);
                        if (!target) return;

                        if (action === 'edit') {
                            artistEditId.value = target.id;
                            artistName.value = target.name || '';
                            artistPhoto.value = target.photo || '';
                            artistAlbums.value = (target.albums || []).map((album) => album.title).join(', ');
                            renderSongPicker(target.popularSongs || []);
                            artistSubmitBtn.textContent = 'Обновить Артиста';
                            return;
                        }

                        if (!window.confirm('Удалить профиль артиста "' + target.name + '"?')) return;
                        const nextArtists = artists.filter((artist) => artist.id !== artistId);
                        saveJson(ARTISTS_STATE_KEY, nextArtists);
                        renderArtists();
                        resetArtistForm();
                    });
                });
            }

            function resetArtistForm() {
                artistForm.reset();
                artistEditId.value = '';
                artistSubmitBtn.textContent = 'Сохранить Артиста';
                renderSongPicker();
            }

            songForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const title = songTitle.value.trim();
                const artist = songArtist.value.trim();
                const src = songSrc.value.trim();
                const cover = songCover.value.trim() || DEFAULT_CUSTOM_COVER;
                const lyrics = songLyrics.value.trim();
                const section = songSection.value === 'user' ? 'user' : 'trending';
                if (!title || !artist || !src) return;

                const newSong = {
                    id: 'a-song-' + Date.now(),
                    title,
                    artist,
                    cover,
                    plays: 0,
                    src,
                    lyrics
                };

                const adminSongs = getAdminAddedSongs();
                adminSongs.push(newSong);
                saveJson(ADMIN_ADDED_SONGS_KEY, adminSongs);

                const catalog = ensureCatalog();
                catalog.push({
                    id: newSong.id,
                    title: newSong.title,
                    artist: newSong.artist,
                    isCustom: false,
                    isAdminAdded: true
                });
                saveJson(ADMIN_SONG_CATALOG_KEY, catalog);

                const sectionOverrides = getSectionOverrides();
                sectionOverrides[newSong.id] = section;
                saveJson(SONG_SECTION_OVERRIDES_KEY, sectionOverrides);

                songForm.reset();
                renderSongs();
                renderSongPicker();
            });

            artistForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const editId = artistEditId.value.trim();
                const name = artistName.value.trim();
                const photo = artistPhoto.value.trim();
                const albums = artistAlbums.value
                    .split(',')
                    .map((title) => title.trim())
                    .filter(Boolean)
                    .map((title) => ({ title }));
                const popularSongs = getSelectedSongTitlesFromPicker();

                if (!name || !photo) return;

                const artists = getArtistsState();
                if (editId) {
                    const target = artists.find((artist) => artist.id === editId);
                    if (!target) return;
                    target.name = name;
                    target.photo = photo;
                    target.albums = albums;
                    target.popularSongs = popularSongs;
                } else {
                    artists.push({
                        id: 'a-admin-' + Date.now(),
                        name,
                        photo,
                        albums,
                        popularSongs
                    });
                }

                saveJson(ARTISTS_STATE_KEY, artists);
                renderArtists();
                resetArtistForm();
            });

            songSearch.addEventListener('input', renderSongs);
            artistSearch.addEventListener('input', renderArtists);
            reloadSongsBtn.addEventListener('click', () => {
                renderSongs();
                renderSongPicker();
            });
            resetArtistFormBtn.addEventListener('click', resetArtistForm);

            downloadScriptBtn.addEventListener('click', () => {
                const payload = {
                    [ADMIN_ADDED_SONGS_KEY]: getAdminAddedSongs(),
                    [ARTISTS_STATE_KEY]: getArtistsState(),
                    [SONG_SECTION_OVERRIDES_KEY]: getSectionOverrides(),
                    [HIDDEN_SONG_IDS_KEY]: getHiddenIds(),
                    [ADMIN_SONG_CATALOG_KEY]: ensureCatalog()
                };

                const script = [
                    '// WMusic admin export',
                    '(function(){',
                    '  const data = ' + JSON.stringify(payload, null, 2) + ';',
                    '  Object.keys(data).forEach((key) => {',
                    '    localStorage.setItem(key, JSON.stringify(data[key]));',
                    '  });',
                    '  console.log("WMusic admin state imported");',
                    '})();'
                ].join('\n');

                const blob = new Blob([script], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'wmusic-admin-export.js';
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            });

            renderSongs();
            renderSongPicker();
            renderArtists();
        })();
    </script>
</body>
</html>
