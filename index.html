            function renderUserSongs(filter = '') {
                // Ваша музыка — показываем только персональные (private) кастомные треки
                const filtered = songs.filter(s =>
                    s.isCustom && !s.isPublicUpload &&
                    (s.title.toLowerCase().includes(filter.toLowerCase()) || s.artist.toLowerCase().includes(filter.toLowerCase()))
                ).sort((a, b) => getTrackPlayCount(b.id) - getTrackPlayCount(a.id));

                if (!filtered.length) {
                    userSongsGrid.innerHTML = '<div class="liked-empty">Здесь будет ваша музыка</div>';
                    return;
                }

                userSongsGrid.innerHTML = filtered.map(s => `
                    <div class="song-card" data-track-id="${s.id}">
                        <img src="${s.cover}" loading="lazy">
                        <h4>${s.title}</h4>
                        <p>${s.artist}</p>
                    </div>
                `).join('');

                attachTrackCardListeners(userSongsGrid, filtered.map(s => s.id), 'userSongs');
            }

            function renderUserMusic(filter = '') {
                // Пользовательская музыка — показываем публичные пользовательские загрузки
                // админские треки не считаем пользовательскими даже если они загружены в хранилище
                const filtered = songs.filter(s =>
                    (s.isUserUpload || (s.isCustom && s.isPublicUpload && !s.isUnlisted && !s.isAdminAdded)) &&
                    (s.title.toLowerCase().includes(filter.toLowerCase()) || s.artist.toLowerCase().includes(filter.toLowerCase()))
                ).sort((a, b) => getTrackPlayCount(b.id) - getTrackPlayCount(a.id));

                    <div class="song-card" data-track-id="${s.id}">
                        <img src="${s.cover}" loading="lazy">

                        <p>${s.artist}</p>
                    </div>

            function resetPlayerAfterTrackRemoval() {
                audio.pause();
                audio.removeAttribute('src');
                audio.load();

                currentTrackIndex = -1;
                currentTrackId = null;
                currentQueueIndex = -1;
                progressFill.style.width = '0%';

                playerBar.classList.remove('active');
                playerDrawer.classList.remove('active');
                drawerOverlay.classList.remove('active');
                drawerLyricsContainer.classList.remove('active');
                drawerDeleteTrackBtn.classList.add('is-hidden');
                drawerPlaysCount.textContent = '';

                playerPlayPause.classList.remove('fa-pause-circle');
                playerPlayPause.classList.add('fa-play-circle');
                drawerPlayPause.classList.remove('fa-pause-circle');
                drawerPlayPause.classList.add('fa-play-circle');
            }

            async function deleteCustomTrack(trackId) {
                if (!trackId) return;

                const trackIndex = songs.findIndex(s => s.id === trackId && s.isCustom);
                if (trackIndex < 0) return;

                const track = songs[trackIndex];
                // protect public uploads from deletion by others
                if (track.isPublicUpload && track.uploaderId && track.uploaderId !== browserId) {
                    alert('Вы можете удалять только свои собственные загрузки.');
                    return;
                }

                const confirmDelete = window.confirm(`Удалить трек "${track.title}"?`);
                if (!confirmDelete) return;

                const wasCurrentTrack = currentTrackId === trackId;
                songs.splice(trackIndex, 1);

                likedTrackIds.delete(trackId);
                persistLikedTrackIds();

                delete sectionOverrides[trackId];
                hiddenSongIds.delete(trackId);
                persistSectionOverrides();
                persistHiddenSongIds();

                currentQueueIds = currentQueueIds.filter(id => id !== trackId);
                if (!currentQueueIds.length && songs.length) {
                    currentQueueIds = songs.map(s => s.id);
                }
                if (currentTrackId && !wasCurrentTrack) {
                    currentQueueIndex = currentQueueIds.indexOf(currentTrackId);
                }

                for (let i = shuffleHistory.length - 1; i >= 0; i -= 1) {
                    if (shuffleHistory[i] === trackId) {
                        shuffleHistory.splice(i, 1);
                    }
                }

                if (wasCurrentTrack) {
                    resetPlayerAfterTrackRemoval();
                }

                delete trackPlayCounts[trackId];
                persistTrackPlayCounts();

                try {
                    await deleteCustomTrackFromDb(trackId);
                } catch (error) {
                    // If IndexedDB fails, we still keep UI state updated.
                }

                try {
                    if (track.isUserUpload) {
                        await deleteUserUploadFromSupabase(trackId);
                    } else {
                        await deleteTrackFromSupabase(trackId);
                    }
                } catch (error) {
                    // Keep local deletion even when network is unavailable.
                }

                const currentFilter = searchInput.value || '';
                if (currentFilter) {
                    showSearchResults(currentFilter);
                } else {
                    renderSongs();
                }
                renderLikedSongs(currentFilter);
                renderUserSongs(currentFilter);
                renderChartSongs();
                renderUserMusic(currentFilter);
                updateLikeButtonState();
                updateDeleteTrackButtonState();
                persistAdminSongCatalog();
            }

            function renderArtists(filter = '') {
                const filtered = artists.filter(a => a.name.toLowerCase().includes(filter.toLowerCase()))
                    .sort((a, b) => getArtistMonthlyListeners(b.name) - getArtistMonthlyListeners(a.name));
                popularArtistsGrid.innerHTML = filtered.map(a => `
                    <div class="artist-card" data-artist-id="${a.id}">
                        <img src="${a.photo}">
                        <h4>${a.name}</h4>
                        <p>популярно</p>
                    </div>
                `).join('');
                attachArtistListeners();
            }

            function attachArtistListeners() {
                document.querySelectorAll('.artist-card').forEach(card => {
                    card.addEventListener('click', () => {
                        hideSearchResults();
                        const artistId = card.dataset.artistId;
                        const artist = artists.find(a => a.id === artistId);
                        if (artist) showArtistModal(artist);
                    });
                });
            }

            // Плеер
            function playTrack(track, options = {}) {
                audio.src = track.src;

                // update media session metadata & handlers (Android lockscreen/notification)
                if ('mediaSession' in navigator) {
                    try {
                        navigator.mediaSession.metadata = new MediaMetadata({
                            title: track.title || '',
                            artist: track.artist || '',
                            album: '',
                            artwork: [
                                { src: track.cover || '',   sizes: '512x512', type: 'image/png' }
                            ]
                        });

                        navigator.mediaSession.setActionHandler('play', () => { audio.play(); });
                        navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); });
                        navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
                        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
                        // optional handlers:
                        navigator.mediaSession.setActionHandler('stop', () => { audio.pause(); });
                    } catch (err) {
                        console.warn('mediaSession setup failed', err);
                    }
                }

                audio.play();
                currentTrackIndex = songs.findIndex(s => s.id === track.id);
                currentTrackId = track.id;
                currentPlaybackCounted = false;
                listenedSecondsThisSession = 0;
                lastPlaybackTimeSample = null;

                setQueueContext({
                    queueIds: options.queueIds || currentQueueIds,
                    sectionId: options.sectionId || currentSectionId,
                    trackId: track.id,
                    resetHistory: options.resetHistory !== false
                });

                playerCover.src = track.cover;
                playerTrackName.textContent = track.title;
                playerArtistName.textContent = track.artist;
                playerBar.classList.add('active');
                playerPlayPause.classList.remove('fa-play-circle');
                playerPlayPause.classList.add('fa-pause-circle');
                drawerPlayPause.classList.remove('fa-play-circle');
                drawerPlayPause.classList.add('fa-pause-circle');
                drawerCover.src = track.cover;
                drawerTrackName.textContent = track.title;
                renderDrawerArtistLinks(track.artist);
                drawerPlaysCount.textContent = `${formatPlayCount(getTrackPlayCount(track.id))} прослушиваний`;
                setupLyricsForTrack(track);
                drawerLyricsContainer.classList.remove('active');
                updateLyricsButtonState();
                updateShuffleButtonState();
                updateLikeButtonState();
                updateAutoScrollButtonState();
                updateDeleteTrackButtonState();
            }

            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = percent + '%';
                }

                if (lastPlaybackTimeSample === null) {
                    lastPlaybackTimeSample = audio.currentTime;
                } else {
                    const delta = audio.currentTime - lastPlaybackTimeSample;
                    // Ignore seek jumps and count only normal playback progression.
                    if (delta > 0 && delta <= 2.5) {
                        listenedSecondsThisSession += delta;
                    }
                    lastPlaybackTimeSample = audio.currentTime;
                }

                maybeCountCurrentTrackPlay(false);

                // sync position state for the media session, if supported
                if ('mediaSession' in navigator && typeof navigator.mediaSession.setPositionState === 'function') {
                    try {
                        navigator.mediaSession.setPositionState({
                            duration: audio.duration || 0,
                            playbackRate: audio.playbackRate || 1,
                            position: audio.currentTime || 0
                        });
                    } catch (e) {
                        // ignore failure
                    }
                }
            });

            audio.addEventListener('seeking', () => {
                lastPlaybackTimeSample = audio.currentTime;
            });

            // update playback state when starting
            audio.addEventListener('play', () => {
                if ('mediaSession' in navigator) {
                    try { navigator.mediaSession.playbackState = 'playing'; } catch {}
                }
            });

            audio.addEventListener('ended', () => {
                maybeCountCurrentTrackPlay(true);
                nextTrack();
            });

            // При паузе/стопе останавливаем автопрокрутку текста
            audio.addEventListener('pause', () => {
                if (isAutoLyricsEnabled) {
                    isAutoLyricsEnabled = false;
                    updateAutoScrollButtonState();
                    stopLyricsAutoScroll();
                }
                // update media session state
                if ('mediaSession' in navigator) {
                    try { navigator.mediaSession.playbackState = 'paused'; } catch {}
                }
            });

            function nextTrack() {
                if (!currentQueueIds.length) return;
                const isShuffle = Boolean(shuffleBySection[currentSectionId]);

                if (isShuffle && currentQueueIds.length > 1) {
                    if (currentTrackId) {
                        shuffleHistory.push(currentTrackId);
                    }

                    const available = currentQueueIds.filter(id => id !== currentTrackId);
                    const randomId = available[Math.floor(Math.random() * available.length)];
                    playTrackById(randomId, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
                    return;
                }

                const nextIndex = currentQueueIndex >= 0
                    ? (currentQueueIndex + 1) % currentQueueIds.length
                    : 0;
                const nextId = currentQueueIds[nextIndex];
                playTrackById(nextId, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
            }

            function prevTrack() {
                if (!currentQueueIds.length) return;
                const isShuffle = Boolean(shuffleBySection[currentSectionId]);

                if (isShuffle && shuffleHistory.length) {
                    const prevIdFromHistory = shuffleHistory.pop();
                    playTrackById(prevIdFromHistory, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
                    return;
                }

                const prevIndex = currentQueueIndex >= 0
                    ? (currentQueueIndex - 1 + currentQueueIds.length) % currentQueueIds.length
                    : 0;
                const prevId = currentQueueIds[prevIndex];
                playTrackById(prevId, { queueIds: currentQueueIds, sectionId: currentSectionId, resetHistory: false });
            }

            function toggleShuffleForCurrentSection() {
                shuffleBySection[currentSectionId] = !shuffleBySection[currentSectionId];
                if (!shuffleBySection[currentSectionId]) {
                    shuffleHistory.length = 0;
                }
                updateShuffleButtonState();
            }

            function toggleLikeCurrentTrack() {
                if (!currentTrackId) return;
                let liked;
                if (likedTrackIds.has(currentTrackId)) {
                    likedTrackIds.delete(currentTrackId);
                    liked = false;
                } else {
                    likedTrackIds.add(currentTrackId);
                    liked = true;
                }
                persistLikedTrackIds();
                // sync individual change with server asynchronously
                syncLikeToSupabase(currentTrackId, liked);
                updateLikeButtonState();
                renderLikedSongs(searchInput.value || '');
            }

            function togglePlayPause() {
                if (audio.paused) {
                    audio.play();
                    playerPlayPause.classList.remove('fa-play-circle');
                    playerPlayPause.classList.add('fa-pause-circle');
                    drawerPlayPause.classList.remove('fa-play-circle');
                    drawerPlayPause.classList.add('fa-pause-circle');
                } else {
                    audio.pause();
                    playerPlayPause.classList.remove('fa-pause-circle');
                    playerPlayPause.classList.add('fa-play-circle');
                    drawerPlayPause.classList.remove('fa-pause-circle');
                    drawerPlayPause.classList.add('fa-play-circle');
                }
            }

            playerPlayPause.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
            playerNext.addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });
            playerPrev.addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });

            drawerPlayPause.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
            drawerNext.addEventListener('click', (e) => { e.stopPropagation(); nextTrack(); });
            drawerPrev.addEventListener('click', (e) => { e.stopPropagation(); prevTrack(); });

            progressBarContainer.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = progressBarContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                if (audio.duration) {
                    audio.currentTime = (clickX / width) * audio.duration;
                    lastPlaybackTimeSample = audio.currentTime;
                    if (isAutoLyricsEnabled) {
                        startLyricsAutoScroll(true);
                    }
                }
            });

            // Открытие выдвижной панели
            playerBar.addEventListener('click', (e) => {
                if (!e.target.closest('.player-controls-mini i') && !e.target.closest('.player-progress')) {
                    if (currentTrackIndex >= 0) {
                        playerDrawer.classList.add('active');
                        drawerOverlay.classList.add('active');
                    }
                }
            });

            function closeDrawerFunc() {
                playerDrawer.classList.remove('active');
                drawerOverlay.classList.remove('active');
                drawerLyricsContainer.classList.remove('active');
                updateLyricsButtonState();
            }
            closeDrawer.addEventListener('click', closeDrawerFunc);
            drawerOverlay.addEventListener('click', closeDrawerFunc);

            // Открытие текста по кнопке
            drawerLyricsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                drawerLyricsContainer.classList.toggle('active');
                updateLyricsButtonState();
                if (isAutoLyricsEnabled) {
                    startLyricsAutoScroll(true);
                }
            });

            drawerShuffleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleShuffleForCurrentSection();
            });

            drawerLikeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLikeCurrentTrack();
            });

            drawerAutoScrollBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLyricsAutoScroll();
            });

            drawerDeleteTrackBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!currentTrackId) return;
                deleteCustomTrack(currentTrackId);
            });

            playerVolumeSlider.addEventListener('input', (e) => {
                currentVolume = parseFloat(e.target.value);
                audio.volume = currentVolume;
                updateVolumeIcon();
            });

            playerVolumeIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                playerVolumeSlider.classList.toggle('show');
            });

            function updateVolumeIcon() {
                if (currentVolume === 0) {
                    playerVolumeIcon.className = 'fas fa-volume-mute';
                } else if (currentVolume < 0.5) {
                    playerVolumeIcon.className = 'fas fa-volume-down';
                } else {
                    playerVolumeIcon.className = 'fas fa-volume-up';
                }
            }

            drawerLyrics.addEventListener('scroll', () => {
                if (!isAutoLyricsEnabled) return;
                if (isAutoUpdatingLyricsScroll) return;

                const base = getBaseLyricsScrollTarget();
                if (base === null) return;

                // После ручной прокрутки продолжаем автоскролл от позиции пользователя.
                lyricsScrollOffset = drawerLyrics.scrollTop - base;
            }, { passive: true });

            drawerArtistName.addEventListener('click', (e) => {
                const link = e.target.closest('[data-artist-id]');
                if (!link) return;
                const artistId = link.dataset.artistId;
                const artist = artists.find(a => a.id === artistId);
                if (artist) {
                    showArtistModal(artist);
                }
            });

            openUploadTrackModalBtn.addEventListener('click', () => {
                uploadTargetScope = 'personal';
                const header = uploadTrackModal.querySelector('h3');
                if (header) header.textContent = 'Добавить трек в вашу музыку';
                uploadTrackModal.classList.add('active');
                setTimeout(() => uploadTrackTitle.focus(), 60);
            });

            if (openUploadTrackModalBtnUserMusic) {
                openUploadTrackModalBtnUserMusic.addEventListener('click', () => {
                    uploadTargetScope = 'public';
                    const header = uploadTrackModal.querySelector('h3');
                    if (header) header.textContent = 'Загрузить трек (публично)';
                    uploadTrackModal.classList.add('active');
                    // focus first input for convenience
                    setTimeout(() => uploadTrackTitle.focus(), 60);
                });
            }

            closeUploadTrackModal.addEventListener('click', () => {
                uploadTrackModal.classList.remove('active');
            });

            // Fallback: ensure clicking the visible save button actually submits the form
            const saveUploadTrackBtn = document.getElementById('saveUploadTrackBtn');
            if (saveUploadTrackBtn && uploadTrackForm) {
                saveUploadTrackBtn.addEventListener('click', (ev) => {
                    ev.preventDefault();
                    if (typeof uploadTrackForm.requestSubmit === 'function') {
                        uploadTrackForm.requestSubmit();
                    } else {
                        uploadTrackForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
                    }
                });
            }

            uploadTrackForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const title = uploadTrackTitle.value.trim();
                const artist = uploadTrackArtist.value.trim();
                const lyrics = uploadTrackLyrics.value.trim();
                const audioFile = uploadTrackAudio.files && uploadTrackAudio.files[0];
                const coverFile = uploadTrackCover.files && uploadTrackCover.files[0];

                if (!title || !artist || !audioFile) {
                    return;
                }

                try {
                    // disable save button to show progress and avoid duplicate clicks
                    if (saveUploadTrackBtn) {
                        saveUploadTrackBtn.disabled = true;
                        saveUploadTrackBtn.dataset.prevText = saveUploadTrackBtn.textContent;
                        saveUploadTrackBtn.textContent = 'Загрузка...';
                    }

                    const id = createUuid();
                    const audioPath = 'audio/' + id + '-' + sanitizeFileName(audioFile.name || 'track.mp3');
                    const coverPath = coverFile ? 'covers/' + id + '-' + sanitizeFileName(coverFile.name || 'cover.jpg') : '';
                    const trackSrc = await uploadFileToSupabaseStorage(audioPath, audioFile);
                    const trackCover = coverFile
                        ? await uploadFileToSupabaseStorage(coverPath, coverFile)
                        : DEFAULT_CUSTOM_COVER;

                    const customTrack = {
                        id,
                        title,
                        artist,
                        cover: trackCover,
                        plays: 0,
                        src: trackSrc,
                        lyrics,
                        isCustom: true,
                        // mark as user-uploaded if we are sending it to the public/unlisted table
                        isUserUpload: uploadTargetScope === 'public' || uploadTargetScope === 'unlisted',
                        isPublicUpload: uploadTargetScope === 'public' || uploadTargetScope === 'unlisted',
                        isUnlisted: uploadTargetScope === 'unlisted',
                        uploaderId: browserId // record owner for later deletion checks
                    };

                    songs.push(customTrack);

                    // persist custom track locally so it survives reloads
                    // we need to store the audio/cover blobs separately so hydrateCustomTracksFromDb
                    // can recreate object URLs later – the `src` field is not enough for offline.
                    try {
                        const recordForDb = {
                            id,
                            title,
                            artist,
                            plays: 0,
                            lyrics,
                            audioBlob: audioFile,
                            coverBlob: coverFile || null,
                            isPublicUpload: customTrack.isPublicUpload,
                            isUnlisted: customTrack.isUnlisted,
                            uploaderId: customTrack.uploaderId
                        };
                        await saveCustomTrackToDb(recordForDb);
                    } catch (err) {
                        // ignore; we'll still keep it in memory
                        console.warn('Failed to save custom track to IndexedDB', err);
                    }
                    // client-side section override: personal uploads -> user, unlisted -> none, public -> no override (trending)
                    if (uploadTargetScope === 'personal') {
                        sectionOverrides[id] = 'user';
                    } else if (uploadTargetScope === 'unlisted') {
                        sectionOverrides[id] = 'unlisted';
                    } else {
                        delete sectionOverrides[id];
                    }
                    hiddenSongIds.delete(id);

                    persistSectionOverrides();
                    persistHiddenSongIds();

                    // If upload target is public or unlisted it belongs in the separate user_uploads table.
                    let upsertResult = null;
                    if (uploadTargetScope === 'public' || uploadTargetScope === 'unlisted') {
                        upsertResult = await upsertUserUploadToSupabase(customTrack, false);
                        console.log('upsertUserUploadToSupabase result', upsertResult);
                    } else {
                        // personal uploads are kept locally only, but we still maintain a 'user' section override
                        const upsertSection = 'user';
                        upsertResult = await upsertTrackToSupabase(customTrack, upsertSection, false);
                        console.log('upsertTrackToSupabase result', upsertResult);
                    }
                    if (uploadTargetScope === 'public' && upsertResult == null) {
                        alert('Предупреждение: трек сохранён локально, но не удалось отправить его на сервер Supabase.');
                    }
                    uploadTrackModal.classList.remove('active');

                    const currentFilter = searchInput.value || '';
                    if (currentFilter) {
                        showSearchResults(currentFilter);
                    } else {
                        renderSongs();
                    }
                    renderLikedSongs(currentFilter);
                    renderUserSongs(currentFilter);
                    renderChartSongs();
                    renderUserMusic(currentFilter);
                    updateDeleteTrackButtonState();
                    persistAdminSongCatalog();
                } catch (error) {
                    alert('Не удалось загрузить трек в Supabase. Проверь, что в Supabase есть публичный bucket "wmusic-media" и разрешены вставка/чтение файлов.');
                } finally {
                    if (saveUploadTrackBtn) {
                        saveUploadTrackBtn.disabled = false;
                        if (saveUploadTrackBtn.dataset.prevText) {
                            saveUploadTrackBtn.textContent = saveUploadTrackBtn.dataset.prevText;
                            delete saveUploadTrackBtn.dataset.prevText;
                        }
                    }
                }
            });

            // Поиск
            searchToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                searchExpand.classList.toggle('active');
                if (searchExpand.classList.contains('active')) {
                    searchInput.focus();
                }
            });

            document.addEventListener('dblclick', (e) => {
                if (!searchContainer.contains(e.target)) {
                    searchExpand.classList.remove('active');
                    hideSearchResults();
                }
            });
            // additional handler so a normal click outside also closes the dropdown
            document.addEventListener('click', (e) => {
                if (searchExpand.classList.contains('active') && !searchContainer.contains(e.target)) {
                    searchExpand.classList.remove('active');
                    hideSearchResults();
                }
            });

            searchInput.addEventListener('input', (e) => {
                const val = e.target.value.trim();
                if (val) {
                    showSearchResults(val);
                } else {
                    hideSearchResults();
                    renderSongs();
                    renderArtists();
                    renderLikedSongs();
                    renderUserSongs();
                    renderUserMusic();
                }
            });

            // Модалки
            closeLyricsModal.addEventListener('click', () => lyricsModal.classList.remove('active'));
            // helper used in multiple places when we want to close the artist modal
            function closeArtistModal() {
                artistProfileModal.classList.remove('active');
                artistProfileModal.classList.remove('fullpage');
                // always clear the history entry for the modal; after our
                // showArtistModal changes there will be at most one artist state
                history.replaceState({}, '', window.location.pathname + window.location.search);
            }

            closeArtistProfileModal.addEventListener('click', closeArtistModal);
            chartAllBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showChartModal();
            });
            userMusicAllBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showUserMusicModal();
            });
            const recommendationsAllBtnEl = document.getElementById('recommendationsAllBtn');
            if (recommendationsAllBtnEl) {
                recommendationsAllBtnEl.addEventListener('click', (e) => {
                    e.preventDefault();
                    showRecommendationsModal();
                });
            }
            const openUnlistedBtn = document.getElementById('openUploadTrackModalBtnUnlisted');
            if (openUnlistedBtn) {
                openUnlistedBtn.addEventListener('click', () => {
                    uploadTargetScope = 'unlisted';
                    const header = uploadTrackModal.querySelector('h3');
                    if (header) header.textContent = 'Загрузить трек (без раздела)';
                    uploadTrackModal.classList.add('active');
                    setTimeout(() => uploadTrackTitle.focus(), 60);
                });
            }
            window.addEventListener('click', (e) => {
                if (e.target === lyricsModal) lyricsModal.classList.remove('active');
                if (e.target === artistProfileModal) {
                    artistProfileModal.classList.remove('active');
                    artistProfileModal.classList.remove('fullpage');
                    history.replaceState({}, '', window.location.pathname + window.location.search);
                }
                if (e.target === uploadTrackModal) uploadTrackModal.classList.remove('active');
                if (e.target === chartModal) {
                    chartModal.classList.remove('active');
                    chartModal.classList.remove('fullpage');
                    if (location.hash === '#chart' || location.hash === '#trending' || location.hash === '#recommendations') {
                        history.replaceState(null, '', window.location.pathname);
                    }
                }
                if (e.target === userMusicModal) {
                    userMusicModal.classList.remove('active');
                    userMusicModal.classList.remove('fullpage');
                    if (location.hash === '#user') {
                        history.replaceState(null, '', window.location.pathname);
                    }
                }
            });

            // open modal if page loaded with hash (but skip for #chart which is only for user interaction)
            if (location.hash === '#recommendations') showRecommendationsModal();
            else if (location.hash === '#user') showUserMusicModal();
            else {
                // close all modals if loaded with no relevant hash
                chartModal.classList.remove('active', 'fullpage');
                userMusicModal.classList.remove('active', 'fullpage');
                artistProfileModal.classList.remove('active', 'fullpage');
            }

            function findSongCoverByTitle(songTitle) {
                const normalizedTarget = songTitle.toLowerCase().trim();
                const exact = songs.find(s => s.title.toLowerCase().trim() === normalizedTarget);
                if (exact?.cover) return exact.cover;

                const fuzzy = songs.find(s => {
                    const normalized = s.title.toLowerCase().trim();
                    return normalized.includes(normalizedTarget) || normalizedTarget.includes(normalized);
                });
                return fuzzy?.cover || '';
            }

            // handle back/forward navigation for fullpage modals
            window.addEventListener('popstate', (e) => {
                if (e.state?.modal === 'chart') {
                    showChartModal();
                } else if (e.state?.modal === 'recommendations') {
                    showRecommendationsModal();
                } else if (e.state?.modal === 'userMusic') {
                    showUserMusicModal();
                } else if (e.state?.modal === 'artist' && e.state.artistId) {
                    const art = artists.find(a => a.id === e.state.artistId);
                    if (art) showArtistModal(art);
                } else {
                    chartModal.classList.remove('active','fullpage');
                    userMusicModal.classList.remove('active','fullpage');
                    artistProfileModal.classList.remove('active','fullpage');
                }
            });

            // Обновлённый профиль
            function showArtistModal(artist) {
                artistProfileModal.classList.add('fullpage');
                // avoid stacking multiple artist entries in history: if the current
                // history state already represents an artist modal, replace it rather
                // than push a new one. this ensures the back button closes the modal
                // instead of jumping to a previously viewed artist (often HWorld).
                const stateObj = { modal: 'artist', artistId: artist.id };
                if (history.state && history.state.modal === 'artist') {
                    history.replaceState(stateObj, '', `#artist-${artist.id}`);
                } else {
                    history.pushState(stateObj, '', `#artist-${artist.id}`);
                }
                const monthlyListeners = getArtistMonthlyListeners(artist.name);
                const artistQueueIds = artist.popularSongs
                    .map(title => songs.find(s => normalizeName(s.title) === normalizeName(title))?.id)
                    .filter(Boolean);

                artistProfileContent.innerHTML = `
                    <div class="artist-hero">
                        <div class="hero-bg" style="background-image:url('${artist.photo}')"></div>
                        <div class="hero-overlay"></div>
                        <div class="floating-circle"></div>
                        <div class="floating-circle small"></div>
                        <div class="hero-main">
                            <div class="artist-disc">
                                <img src="${artist.photo}" alt="${artist.name}">
                                <div class="disc-ring"></div>
                            </div>
                            <div class="hero-text">
                                <h1 class="artist-name ${artist.name.trim().split(/\s+/).length === 1 ? (artist.name.length <= 8 ? 'single-word short' : 'single-word long') : 'multi-word'}">${artist.name}</h1>
                                <div class="artist-badge">Артист · ${formatPlayCount(monthlyListeners)} слуш./мес</div>
                                </div>
                        </div>
                    </div>
                    <div class="profile-section vertical">
                        <h4>Альбомы</h4>
                        <div class="profile-albums-vert">
                            ${artist.albums.map(alb => `<div class="album-card">${alb.title}</div>`).join('')}
                        </div>
                    </div>
                    <div class="profile-section vertical">
                        <h4>Популярные песни</h4>
                        <div class="profile-songs-vert">
                            ${artist.popularSongs.map(s => {
                                const cover = findSongCoverByTitle(s);
                                return `
                                    <div class="song-card-vert" data-track-id="${songs.find(track => normalizeName(track.title) === normalizeName(s))?.id || ''}">
                                        ${cover
                                            ? `<img src="${cover}" class="song-thumb" alt="${s}">`
                                            : '<div class="song-thumb-placeholder"></div>'}
                                        <div class="song-title-vert">${s}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;

                artistProfileContent.querySelectorAll('.song-card-vert[data-track-id]').forEach(item => {
                    const trackId = item.dataset.trackId;
                    if (!trackId) return;
                    item.style.cursor = 'pointer';
                    item.addEventListener('click', () => {
                        playTrackById(trackId, {
                            queueIds: artistQueueIds.length ? artistQueueIds : [trackId],
                            sectionId: `artist:${artist.id}`,
                            resetHistory: true
                        });
                        // we no longer animate the hero disc; keep it static
                        // remove any leftover playing state on previous items
                        const disc = artistProfileContent.querySelector('.artist-disc');
                        if (disc) {
                            disc.classList.remove('playing');
                        }
                        item.classList.add('playing');
                        closeArtistModal();
                    });
                });
                const shuffleBtn = artistProfileContent.querySelector('.hero-shuffle');
                if (shuffleBtn) {
                    // update history state so shuffle doesn't re-open modal
                    history.replaceState({ modal: 'artist', artistId: artist.id }, '', `#artist-${artist.id}`);
                    shuffleBtn.addEventListener('click', () => {
                        artist.popularSongs.sort(() => Math.random() - 0.5);
                        // re-render songs section
                        const songsSection = artistProfileContent.querySelector('.profile-songs-vert');
                        if (songsSection) {
                            songsSection.innerHTML = artist.popularSongs.map(s => {
                                const cover = findSongCoverByTitle(s);
                                return `
                                    <div class="song-card-vert" data-track-id="${songs.find(track => normalizeName(track.title) === normalizeName(s))?.id || ''}">
                                        ${cover
                                            ? `<img src="${cover}" class="song-thumb" alt="${s}">`
                                            : '<div class="song-thumb-placeholder"></div>'}
                                        <div class="song-title-vert">${s}</div>
                                    </div>
                                `;
                            }).join('');
                            // reattach click listeners
                            artistProfileContent.querySelectorAll('.song-card-vert[data-track-id]').forEach(item => {
                                const trackId = item.dataset.trackId;
                                if (!trackId) return;
                                item.style.cursor = 'pointer';
                                item.addEventListener('click', () => {
                                    playTrackById(trackId, {
                                        queueIds: artistQueueIds.length ? artistQueueIds : [trackId],
                                        sectionId: `artist:${artist.id}`,
                                        resetHistory: true
                                    });
                                    const disc = artistProfileContent.querySelector('.artist-disc');
                                    if (disc) disc.classList.remove('playing');
                                    item.classList.add('playing');
                                    closeArtistModal();
                                });
                            });
                        }
                    });
                }

                artistProfileModal.classList.add('active');
            }

            function showChartModal() {
                chartModal.classList.add('fullpage');
                // push history entry so user can hit back to close
                history.pushState({ modal: 'chart' }, '', '#chart');
                const top100 = songs
                    .sort((a, b) => getTrackPlayCount(b.id) - getTrackPlayCount(a.id))
                    .slice(0, 100);
                const columns = [];
                for (let i = 0; i < 100; i += 10) {
                    columns.push(top100.slice(i, i + 10));
                }
                chartModalContent.innerHTML = `
                    <div class="modal-header">
                        <h1>Топ 100 песен</h1>
                        <span class="close-btn" id="closeChartModal">&times;</span>
                    </div>
                    <div class="modal-body">
                        ${columns.map((col, colIndex) => `
                            <div class="chart-column">
                                ${col.map((s, index) => `
                                    <div class="chart-item" data-track-id="${s.id}">
                                        <span class="chart-number">${colIndex * 10 + index + 1}</span>
                                        <img src="${s.cover}" class="chart-cover" loading="lazy">
                                        <div class="chart-info">
                                            <div class="chart-title">${s.title}</div>
                                            <div class="chart-artist">${s.artist}</div>
                                        </div>
                                        <div class="chart-plays">${formatPlayCount(getTrackPlayCount(s.id))}</div>
                                    </div>
                                `).join('')}
                            </div>
                        `).join('')}
                    </div>
                `;
                chartModalContent.querySelectorAll('.chart-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const trackId = item.dataset.trackId;
                        playTrackById(trackId, { queueIds: top100.map(s => s.id), sectionId: 'chart', resetHistory: true });
                        chartModal.classList.remove('active');
                        chartModal.classList.remove('fullpage');
                    });
                });
                const closeChartModal = chartModalContent.querySelector('#closeChartModal');
                closeChartModal.addEventListener('click', () => {
                    chartModal.classList.remove('active');
                    chartModal.classList.remove('fullpage');
                });
                chartModal.classList.add('active');
            }

            // helper: display full recommendations list in modal
            function showRecommendationsModal() {
                chartModal.classList.add('fullpage');
                history.pushState({ modal: 'recommendations' }, '', '#recommendations');
                // recommendations: list all non-user songs in current order
                let recommendationTracks = songs
                    .filter(isTrackRecommended);
                recommendationTracks.sort((a,b) => {
                    const ia = recommendationOrder.indexOf(a.id);
                    const ib = recommendationOrder.indexOf(b.id);
                    return ia - ib;
                });
                // render back to column layout (no numbering)
                const columns = [];
                for (let i = 0; i < recommendationTracks.length; i += 10) {
                    columns.push(recommendationTracks.slice(i, i + 10));
                }
                chartModalContent.innerHTML = `
                    <div class="modal-header">
                        <h1>Все рекомендации</h1>
                        <span class="close-btn" id="closeChartModal">&times;</span>
                    </div>
                    <div class="modal-body">
                        ${columns.map(col => `
                            <div class="chart-column">
                                ${col.map(s => `
                                    <div class="chart-item" data-track-id="${s.id}">
                                        <img src="${s.cover}" class="chart-cover" loading="lazy">
                                        <div class="chart-info">
                                            <div class="chart-title">${s.title}</div>
                                            <div class="chart-artist">${s.artist}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `).join('')}
                    </div>
                `;
                chartModalContent.querySelectorAll('.chart-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const trackId = item.dataset.trackId;
                        playTrackById(trackId, { queueIds: recommendationTracks.map(s => s.id), sectionId: 'trending', resetHistory: true });
                        chartModal.classList.remove('active');
                        chartModal.classList.remove('fullpage');
                        if (location.hash === '#recommendations') {
                            history.replaceState(null, '', window.location.pathname);
                        }
                    });
                });
                const closeChartModal = chartModalContent.querySelector('#closeChartModal');
                closeChartModal.addEventListener('click', () => {
                    chartModal.classList.remove('active');
                    chartModal.classList.remove('fullpage');
                    if (location.hash === '#recommendations') {
                        history.replaceState(null, '', window.location.pathname);
                    }
                });
                chartModal.classList.add('active');
            }

            // search helpers
            function renderSearchSongs(filter) {
                const normalized = filter.toLowerCase();
                const matched = songs
                    .filter(s => !hiddenSongIds.has(s.id))
                    .filter(s =>
                        s.title.toLowerCase().includes(normalized) ||
                        s.artist.toLowerCase().includes(normalized)
                    )
                    .sort((a, b) => getTrackPlayCount(b.id) - getTrackPlayCount(a.id));
                const host = document.getElementById('searchSongsGrid');
                host.innerHTML = matched.map((s, idx) => `
                    <div class="song-card" data-track-id="${s.id}" style="animation-delay:${idx*0.04}s;">
                        <img src="${s.cover}" loading="lazy">
                        <h4>${s.title}</h4>
                        <p>${s.artist}</p>
                    </div>
                `).join('');
                attachTrackCardListeners(host, matched.map(s => s.id), 'search');
            }

            function renderSearchArtists(filter) {
                const normalized = filter.toLowerCase();
                const matched = artists
                    .filter(a => a.name.toLowerCase().includes(normalized))
                    .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'ru'));
                const host = document.getElementById('searchArtistsGrid');
                host.innerHTML = matched.map((a, idx) => `
                    <div class="artist-card" data-artist-id="${a.id}" style="animation-delay:${idx*0.04}s;">
                        <img src="${a.photo || DEFAULT_CUSTOM_COVER}" loading="lazy">
                        <h4>${a.name}</h4>
                    </div>
                `).join('');
                attachArtistListeners();
            }

            function showSearchResults(filter) {
                document.querySelectorAll('.glass-section').forEach(el => {
                    if (!el.classList.contains('search-results')) el.style.display = 'none';
                });
                const songsSection = document.getElementById('searchSongsSection');
                const artistsSection = document.getElementById('searchArtistsSection');
                songsSection.style.display = 'block';
                artistsSection.style.display = 'block';
                songsSection.classList.add('active');
                artistsSection.classList.add('active');
                renderSearchSongs(filter);
                renderSearchArtists(filter);
            }

            function hideSearchResults() {
                document.querySelectorAll('.glass-section').forEach(el => {
                    el.style.display = 'block';
                    if (el.classList.contains('search-results')) {
                        el.style.display = 'none';
                    }
                });
                document.querySelectorAll('.search-results').forEach(el => el.classList.remove('active'));
            }

            function showUserMusicModal() {
                userMusicModal.classList.add('fullpage');
                history.pushState({ modal: 'userMusic' }, '', '#user');
                // only public uploads should appear here; exclude admin-added songs
                const allUserTracks = songs.filter(s => s.isCustom && s.isPublicUpload && !s.isUnlisted && !s.isAdminAdded)
                    .sort((a, b) => getTrackPlayCount(b.id) - getTrackPlayCount(a.id));
                const columns = [];
                for (let i = 0; i < allUserTracks.length; i += 10) {
                    columns.push(allUserTracks.slice(i, i + 10));
                }
                userMusicModalContent.innerHTML = `
                    <div class="modal-header">
                        <h1>Пользовательская музыка</h1>
                        <span class="close-btn" id="closeUserMusicModal">&times;</span>
                    </div>
                    <div class="modal-body">
                        ${columns.map((col, colIndex) => `
                            <div class="chart-column">
                                ${col.map((s, index) => `
                                    <div class="chart-item" data-track-id="${s.id}">
                                        <span class="chart-number">${colIndex * 10 + index + 1}</span>
                                        <img src="${s.cover}" class="chart-cover" loading="lazy">
                                        <div class="chart-info">
                                            <div class="chart-title">${s.title}</div>
                                            <div class="chart-artist">${s.artist}</div>
                                        </div>
                                        <div class="chart-plays">${formatPlayCount(getTrackPlayCount(s.id))}</div>
                                    </div>
                                `).join('')}
                            </div>
                        `).join('')}
                    </div>
                `;
                userMusicModalContent.querySelectorAll('.chart-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const trackId = item.dataset.trackId;
                        playTrackById(trackId, { queueIds: allUserTracks.map(s => s.id), sectionId: 'userMusic', resetHistory: true });
                        userMusicModal.classList.remove('active');
                        userMusicModal.classList.remove('fullpage');
                        if (location.hash === '#user') {
                            history.replaceState(null, '', window.location.pathname);
                        }
                    });
                });
                const closeUserMusicModal = userMusicModalContent.querySelector('#closeUserMusicModal');
                closeUserMusicModal.addEventListener('click', () => {
                    userMusicModal.classList.remove('active');
                    userMusicModal.classList.remove('fullpage');
                    if (location.hash === '#user') {
                        history.replaceState(null, '', window.location.pathname);
                    }
                });
                userMusicModal.classList.add('active');
            }

            // Инициализация
            if (shouldResetTrackPlays) {
                resetAllTrackPlaysToZero();
            }

            {
                const initialFilter = searchInput.value || '';
                if (initialFilter) {
                    showSearchResults(initialFilter);
                } else {
                    renderSongs();
                }
                renderArtists(initialFilter);
                renderLikedSongs(initialFilter);
                renderUserSongs(initialFilter);
                renderChartSongs(initialFilter);
                renderUserMusic(initialFilter);
                updateAutoScrollButtonState();
            }
            updateVolumeIcon();
            updateDeleteTrackButtonState();
            syncTrackPlayCountsWithSongs();
            persistAdminSongCatalog();

            (async () => {
                await migrateLocalLibraryToSupabaseOnce();
                // load any tracks stored locally (IndexedDB or legacy localStorage)
                try {
                    await hydrateCustomTracksFromDb();
                } catch (err) {
                    console.warn('Failed to hydrate custom tracks from IndexedDB', err);
                }
                try {
                    appendCustomTracksToSongs();
                } catch (err) {
                    console.warn('Failed to append legacy custom tracks', err);
                }
                await hydrateFromSupabase();
                // pull likes that may have been stored for this browser
                await loadLikedTracksFromSupabase();
                if (shouldResetTrackPlays) {
                    markTrackPlaysResetDone();
                    shouldResetTrackPlays = false;
                }
                syncTrackPlayCountsWithSongs();

                const currentFilter = searchInput.value || '';
                initRecommendationOrder();
                renderSongs(currentFilter);
                renderArtists(currentFilter);
                renderLikedSongs(currentFilter);
                renderUserSongs(currentFilter);
                renderChartSongs();
                renderUserMusic(currentFilter);
                updateDeleteTrackButtonState();
                persistAdminSongCatalog();
                // periodically shuffle a small subset of recommendations so grid feels alive
                setInterval(() => {
                    shufflePartRecommendations();
                    if (!searchInput.value) renderSongs();
                }, 4000 + Math.random() * 1000); // каждые 4-5 секунд

                refreshRemotePlayCounts();
                window.setInterval(refreshRemotePlayCounts, 25000);
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        refreshRemotePlayCounts();
                    }
                });
            })(); // end async bootstrap IIFE
            // outer IIFE removed, код продолжит выполняться здесь без оболочки
    </script>
</body>
</html>
