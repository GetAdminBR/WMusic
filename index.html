<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA WAVE — glass edition</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0c0a1a;
            position: relative;
            padding: 20px 16px 100px;
            color: #fff;
        }

        .page-shell {
            position: relative;
            z-index: 1;
        }

        /* Анимированный фон с пятнами */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0b0818;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(70, 130, 255, 0.3) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(160, 100, 255, 0.35) 0%, transparent 35%),
                        radial-gradient(circle at 40% 80%, rgba(50, 200, 255, 0.25) 0%, transparent 40%),
                        radial-gradient(circle at 90% 20%, rgba(200, 100, 255, 0.3) 0%, transparent 30%);
            filter: blur(40px);
            animation: lightMove 16s infinite alternate ease-in-out;
        }

        .background::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(100, 80, 255, 0.25) 0%, transparent 35%),
                        radial-gradient(circle at 30% 60%, rgba(180, 120, 255, 0.3) 0%, transparent 40%);
            filter: blur(50px);
            animation: lightMove2 20s infinite alternate-reverse;
        }

        @keyframes lightMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(-3%, -2%) scale(1.2); opacity: 0.9; }
        }

        @keyframes lightMove2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(4%, 3%) scale(1.3); opacity: 0.8; }
        }

        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .logo {
            display: flex;
            align-items: center;
            animation: logoFloat 4s ease-in-out infinite;
        }

        .logo img {
            height: 44px;
            width: auto;
            border-radius: 16px;
            filter: drop-shadow(0 0 12px rgba(200, 160, 255, 0.5));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Минималистичный стеклянный поиск */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .search-toggle {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }

        .search-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-expand {
            position: absolute;
            right: 0;
            top: 0;
            width: 0;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.3s ease, opacity 0.2s;
            background: rgba(20, 18, 30, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
        }

        .search-expand.active {
            width: 220px;
            opacity: 1;
            padding: 8px 16px;
        }

        .search-expand input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
            padding: 6px 0;
        }

        .search-expand input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* Стили для секции результатов поиска */
        .search-results {
            display: none; /* скрыта по умолчанию */
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .search-results.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }
        .search-results .song-card,
        .search-results .artist-card {
            opacity: 0;
            animation: popIn 0.25s forwards;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Стеклянные карточки разделов */
        .glass-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 18px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 450;
            color: #f0eaff;
            text-transform: lowercase;
            letter-spacing: -0.3px;
        }

        .section-header a {
            color: #c7b0ff;
            font-size: 15px;
            text-decoration: none;
            opacity: 0.8;
            transition: 0.2s;
        }

        .section-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-actions button {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: #f3e8ff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .section-actions button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .desktop-scroll-controls {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .desktop-scroll-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: #f3e8ff;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            transition: 0.2s;
        }

        .desktop-scroll-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.32);
        }

        .section-header a:hover {
            opacity: 1;
        }

        .cards-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
            cursor: grab;
            mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
        }

        .cards-scroll.is-dragging {
            cursor: grabbing;
            user-select: none;
        }

        .cards-scroll::-webkit-scrollbar {
            display: none;
        }

        .song-card, .artist-card {
            flex: 0 0 150px;
            width: 150px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .upload-card {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            flex: 0 0 210px;
            width: 210px;
            padding: 18px;
            border-radius: 28px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px dashed rgba(255, 255, 255, 0.12);
            color: #e9ddff;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .upload-card:hover {
            transform: translateY(-6px);
            background: rgba(255,255,255,0.06);
            border-color: rgba(180, 220, 255, 0.5);
        }

        .upload-card .plus {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(140,90,255,0.28), rgba(88,196,255,0.18));
            font-size: 34px;
            color: white;
            box-shadow: 0 12px 30px rgba(88, 80, 140, 0.28);
        }

        .song-card:hover, .artist-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(220, 180, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .song-card img, .artist-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 10px;
        }

        .song-card h4, .artist-card h4 {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }

        .song-card p, .artist-card p {
            font-size: 14px;
            color: #cbb5ff;
        }

        .liked-empty {
            width: 100%;
            padding: 22px 16px;
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: rgba(231, 213, 255, 0.78);
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            font-size: 15px;
        }

        .upload-track-btn {
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.08);
            color: #f0e4ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap; /* prevent wrapping of + and text on narrow screens */
        }

        .upload-track-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(180, 220, 255, 0.66);
        }

        .drawer-action-btn.delete-track-btn {
            color: #ffd3e9;
            border-color: rgba(255, 180, 216, 0.42);
        }

        .drawer-action-btn.delete-track-btn:hover {
            color: #fff;
            border-color: rgba(255, 183, 214, 0.8);
            background: linear-gradient(145deg, rgba(255, 123, 180, 0.44), rgba(255, 123, 163, 0.24));
        }

        .drawer-action-btn.is-hidden {
            display: none;
        }

        .upload-form {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .upload-form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-form label {
            font-size: 14px;
            color: #e7d4ff;
        }

        .upload-form input,
        .upload-form textarea {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-radius: 14px;
            padding: 11px 12px;
            outline: none;
            font-size: 15px;
        }

        .upload-form textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.4;
        }

        .upload-form input[type="file"] {
            padding: 8px;
        }

        .upload-form-submit {
            margin-top: 8px;
            width: 100%;
            border: 1px solid rgba(183, 231, 255, 0.68);
            background: linear-gradient(145deg, rgba(147, 97, 255, 0.52), rgba(77, 178, 255, 0.35));
            color: #fff;
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        /* Плеер внизу */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 18, 30, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 18px 10px;
            align-items: center;
            gap: 14px;
            z-index: 1000;
            cursor: pointer;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .player-bar.active {
            display: flex;
            transform: translateY(0);
        }

        .player-cover {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 5px 20px #1e0c30;
        }

        .player-info {
            flex: 2;
            pointer-events: none;
        }

        .player-track {
            font-size: 16px;
            font-weight: 500;
            color: white;
        }

        .player-artist {
            font-size: 13px;
            color: #d2b5ff;
        }

        .player-controls-mini {
            display: flex;
            gap: 18px;
            align-items: center;
            pointer-events: auto;
        }

        .player-controls-mini i {
            font-size: 26px;
            color: #f0e0ff;
            transition: 0.1s;
        }

        .player-controls-mini i:active {
            transform: scale(0.9);
        }

        .player-progress {
            position: absolute;
            bottom: 0;
            left: 18px;
            width: calc(100% - 36px);
            height: 4px;
            background: rgba(255,255,255,0.15);
            cursor: pointer;
            pointer-events: auto;
            border-radius: 2px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f09aff, #c08eff, #a07eff);
            transition: width 0.1s;
            border-radius: 2px;
        }

        /* ВЫДВИЖНАЯ ПАНЕЛЬ (исправленная структура) */
        .player-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 92vh;
            background: rgba(18, 14, 30, 0.98);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            padding: 24px 20px 20px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 2000;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .player-drawer.active {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .drawer-close {
            font-size: 28px;
            color: #e0c8ff;
            cursor: pointer;
            opacity: 0.8;
            transition: 0.2s;
        }

        .drawer-close:hover {
            opacity: 1;
        }

        .drawer-cover {
            width: 270px;
            height: 270px;
            border-radius: 32px;
            display: block;
            box-shadow: 0 20px 40px #1a0a28;
        }

        .drawer-cover-wrap {
            width: 294px;
            height: 294px;
            margin: 0 auto 18px;
            display: grid;
            place-items: center;
            position: relative;
            isolation: isolate;
        }

        .drawer-cover-wrap::before,
        .drawer-cover-wrap::after {
            content: '';
            position: absolute;
            inset: 14px;
            border-radius: 38px;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.82;
            animation: trackGlow 4.8s ease-in-out infinite;
        }

        .drawer-cover-wrap::before {
            background: radial-gradient(circle at 28% 32%, rgba(94, 214, 255, 0.6), rgba(130, 88, 255, 0.2) 62%, transparent 80%);
        }

        .drawer-cover-wrap::after {
            background: radial-gradient(circle at 72% 70%, rgba(235, 130, 255, 0.58), rgba(90, 148, 255, 0.18) 60%, transparent 82%);
            animation-delay: -2.4s;
        }

        @keyframes trackGlow {
            0%, 100% {
                transform: scale(0.93);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.98;
            }
        }

        .drawer-track {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .drawer-artist {
            font-size: 18px;
            color: #dbb5ff;
            text-align: center;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .drawer-plays {
            font-size: 13px;
            color: #c8b6de;
            text-align: center;
            margin-bottom: 14px;
        }

        .drawer-artist-link {
            color: #e7c9ff;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: 0.18s;
            cursor: pointer;
        }

        .drawer-artist-link:hover {
            color: #fff;
            border-color: rgba(190, 228, 255, 0.62);
            background: rgba(151, 99, 255, 0.24);
        }

        .drawer-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px 0 10px;
        }

        .drawer-controls i {
            font-size: 40px;
            color: #fff0ff;
            cursor: pointer;
            transition: 0.2s;
        }

        .drawer-controls i:active {
            transform: scale(0.9);
        }

        /* Блок текста (скрыт по умолчанию) */
        .drawer-lyrics-container {
            display: flex;
            flex: 1;
            min-height: 0;
            flex-direction: column;
            margin: 10px 0;
            opacity: 0;
            transform: translateY(14px) scale(0.98);
            max-height: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease, max-height 0.35s ease;
        }

        .drawer-lyrics-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            max-height: 45vh;
            pointer-events: auto;
        }

        .drawer-lyrics-container h4 {
            font-size: 15px;
            margin-bottom: 12px;
            color: #e1caff;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .drawer-lyrics {
            background: linear-gradient(165deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
            border-radius: 26px;
            padding: 18px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.75;
            color: #f0e0ff;
            flex: 1;
            scrollbar-width: none;
            white-space: pre-wrap; /* сохраняем переносы строк */
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 26px rgba(0,0,0,0.24);
        }

        .drawer-lyrics::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        /* Дополнительные иконки прижаты к низу */
        .drawer-extra {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: auto; /* прижимает к низу, когда текст скрыт */
            padding: 15px 0 5px;
            flex-wrap: wrap;
        }

        .drawer-action-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: linear-gradient(160deg, rgba(255,255,255,0.11), rgba(255,255,255,0.02));
            color: #e0c8ff;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            display: grid;
            place-items: center;
        }

        .drawer-action-btn:hover {
            color: white;
            transform: translateY(-2px);
            border-color: rgba(194, 229, 255, 0.62);
        }

        .drawer-action-btn.active {
            color: #ffffff;
            border-color: rgba(175, 232, 255, 0.78);
            background: linear-gradient(145deg, rgba(152, 106, 255, 0.44), rgba(88, 196, 255, 0.22));
            box-shadow: 0 0 18px rgba(151, 109, 255, 0.36);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* МОДАЛКА ПРОФИЛЯ (современный стиль) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(25, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 0;
            padding: 40px 20px;
            width: 100%;
            height: 100%;
            max-width: none;
            border: none;
            color: white;
            box-shadow: none;
            transform: scale(1);
            opacity: 1;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h1 {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
        }

            function initRecommendationOrder() {

            function shufflePartRecommendations() {
                const len = recommendationOrder.length;
                if (len <= 1) return;
                
                // Детерминированное перемешивание на основе текущего времени
                const now = new Date();
                const timeSlot = Math.floor((now.getTime() / 1000 / 5)) % 1000; // каждые 5 секунд новый слот
                
                // Простой LCG генератор с сидом на основе времени
                let seed = timeSlot;
                const pseudoRandom = () => {
                    seed = (seed * 1103515245 + 12345) % 2147483648;
                    return (seed / 2147483648);
                };
                
                const count = Math.min(len, Math.floor(pseudoRandom() * 5) + 3);
                const indices = [];
                while (indices.length < count) {
                    const r = Math.floor(pseudoRandom() * len);
                    if (!indices.includes(r)) indices.push(r);
                }
                const items = indices.map(i => recommendationOrder[i]);
                items.sort(() => pseudoRandom() - 0.5);
                indices.forEach((idx, i) => {
                    recommendationOrder[idx] = items[i];
                });
            }

            const SUPABASE_STORAGE_BUCKET = 'wmusic-media';
            const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
            const supabaseTablesAvailable = {

            function isUuid(value) {
                return UUID_RE.test(String(value || ''));
            }

            function createUuid() {
                if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                    return window.crypto.randomUUID();
                }

                const bytes = new Uint8Array(16);
                if (window.crypto && typeof window.crypto.getRandomValues === 'function') {
                    window.crypto.getRandomValues(bytes);
                } else {
                    for (let i = 0; i < bytes.length; i += 1) bytes[i] = Math.floor(Math.random() * 256);
                }

                bytes[6] = (bytes[6] & 0x0f) | 0x40;
                bytes[8] = (bytes[8] & 0x3f) | 0x80;

                const hex = [...bytes].map((b) => b.toString(16).padStart(2, '0')).join('');
                return [
                    hex.slice(0, 8),
                    hex.slice(8, 12),
                    hex.slice(12, 16),
                    hex.slice(16, 20),
                    hex.slice(20)
                ].join('-');
            }

            function sanitizeFileName(name) {
                return String(name || 'file')

                    .slice(0, 80) || 'file';
            }

            function buildStoragePublicUrl(path) {
                const encodedPath = String(path || '')
                    .split('/')
                    .filter(Boolean)
                    .map((part) => encodeURIComponent(part))
                    .join('/');
                return SUPABASE_URL + '/storage/v1/object/public/' + SUPABASE_STORAGE_BUCKET + '/' + encodedPath;
            }

            async function uploadFileToSupabaseStorage(path, file) {
                const targetPath = String(path || '');
                if (!targetPath || !file) {
                    throw new Error('Пустой путь загрузки в Supabase Storage');
                }

                const response = await fetch(
                    SUPABASE_URL + '/storage/v1/object/' + SUPABASE_STORAGE_BUCKET + '/' + targetPath.split('/').map((part) => encodeURIComponent(part)).join('/'),
                    {
                        method: 'POST',
                        headers: {
                            apikey: SUPABASE_ANON_KEY,
                            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                            'x-upsert': 'true',
                            'Content-Type': file.type || 'application/octet-stream'
                        },
                        body: file
                    }
                );

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(text || ('Storage upload failed: HTTP ' + response.status));
                }

                return buildStoragePublicUrl(targetPath);
            }

            function isTrackFromSupabaseStorage(src) {
                return String(src || '').includes('/storage/v1/object/public/' + SUPABASE_STORAGE_BUCKET + '/');
            }

            async function upsertTrackToSupabase(song, section, isHidden) {
                if (!supabaseTablesAvailable.tracks) return null;
                if (!song || !isUuid(song.id)) return null;

                const payload = {

                            src: song.src,

                            plays: Number(song.plays || 0),
                            section: section === 'user' ? 'user' : section === 'unlisted' ? 'unlisted' : 'trending',

                };
                if (song.uploaderId) {

                const response = await supabaseRequest('/rest/v1/tracks', {

                try {

            async function supabaseRequest(path, options) {
                const merged = Object.assign({}, options || {});
                const customHeaders = merged.headers || {};
                merged.headers = Object.assign(
                    {
                        apikey: SUPABASE_ANON_KEY,
                        Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
                        'Content-Type': 'application/json'
                    },
                    customHeaders
                );

                const response = await fetch(SUPABASE_URL + path, merged);
                if (!response.ok) {
                    const text = await response.text();
                    console.error('Supabase request failed', { path, status: response.status, body: text });
                    throw new Error(text || ('HTTP ' + response.status));
                }

                if (response.status === 204) return null;

                const text = await response.text();
                if (!text) return null;

                try {
                    return JSON.parse(text);
                } catch (error) {
                    return text;
                }
            }

            function getErrorMessageText(error) {
                return String((error && error.message) || '').toLowerCase();
            }

            function isMissingTableError(error, tableName) {
                const text = getErrorMessageText(error);
                if (!text.includes('pgrst205')) return false;
                if (!tableName) return true;
                return text.includes("public." + String(tableName).toLowerCase());
            }

            async function supabaseRequestWithTableFallback(path, options, tableName, fallbackValue) {
                try {
                    return await supabaseRequest(path, options);
                } catch (error) {
                    if (isMissingTableError(error, tableName)) {
                        supabaseTablesAvailable[tableName] = false;
                        return fallbackValue;
                    }
                    throw error;
                }
            }

            function hashStringToHex32(input) {
                const text = String(input || '');
                let h1 = 0xdeadbeef ^ text.length;
                let h2 = 0x41c6ce57 ^ text.length;
                let h3 = 0xc0decafe ^ text.length;
                let h4 = 0x1234567 ^ text.length;

                for (let i = 0; i < text.length; i += 1) {
                    const ch = text.charCodeAt(i);
                    h1 = Math.imul(h1 ^ ch, 2654435761);
                    h2 = Math.imul(h2 ^ ch, 1597334677);
                    h3 = Math.imul(h3 ^ ch, 2246822507);
                    h4 = Math.imul(h4 ^ ch, 3266489909);
                }

                h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
                h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
                h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
                h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);

                const words = [h1 ^ h2 ^ h3 ^ h4, h2 ^ h1, h3 ^ h1, h4 ^ h1].map((value) => {
                    return (value >>> 0).toString(16).padStart(8, '0');
                });

                return words.join('');
            }

            function deterministicUuidFromSeed(seed) {
                const hex = hashStringToHex32(seed);
                const chars = hex.slice(0, 32).split('');
                chars[12] = '4';
                chars[16] = ((parseInt(chars[16], 16) & 0x3) | 0x8).toString(16);
                return [
                    chars.slice(0, 8).join(''),
                    chars.slice(8, 12).join(''),
                    chars.slice(12, 16).join(''),
                    chars.slice(16, 20).join(''),
                    chars.slice(20, 32).join('')
                ].join('-');
            }

            function toRemoteTrackId(localId) {
                const id = String(localId || '');
                if (!id) return '';
                return isUuid(id) ? id : deterministicUuidFromSeed('wmusic:track:' + id);
            }

            function toRemoteArtistId(localId) {
                const id = String(localId || '');
                if (!id) return '';
                return isUuid(id) ? id : deterministicUuidFromSeed('wmusic:artist:' + id);
            }

            function shouldSkipRemoteTrackSource(src) {
                const value = String(src || '').trim().toLowerCase();
                if (!value) return true;
                return value.startsWith('blob:') || value.startsWith('data:');
            }

            async function migrateLocalLibraryToSupabaseOnce() {
                const defaultState = {
                    tracks: false,
                    artists: false,
                    artistTracks: false
                };

                let bootstrapState = Object.assign({}, defaultState);
                try {
                    const raw = localStorage.getItem(SUPABASE_LIBRARY_BOOTSTRAP_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (parsed && typeof parsed === 'object') {
                            bootstrapState = Object.assign({}, defaultState, parsed);
                        }
                    }
                } catch (error) {
                    // continue without marker if localStorage is unavailable
                }

                if (bootstrapState.tracks && bootstrapState.artists && bootstrapState.artistTracks) {
                    return;
                }

                const remoteTrackRows = songs
                    .filter((song) => song && song.id && song.title && song.artist && !shouldSkipRemoteTrackSource(song.src))
                    .map((song) => {
                        const remoteId = toRemoteTrackId(song.id);
                        if (!remoteId) return null;

                        const section = getTrackSection(song);
                        return {
                            id: remoteId,
                            title: String(song.title || ''),
                            artist_name: String(song.artist || ''),
                            cover: String(song.cover || DEFAULT_CUSTOM_COVER),
                            src: String(song.src || ''),
                            lyrics: String(song.lyrics || ''),
                            plays: getTrackPlayCount(song.id),
                            section: section === 'user' ? 'user' : 'trending',
                            is_hidden: hiddenSongIds.has(song.id)
                        };
                    })
                    .filter(Boolean);

                if (!bootstrapState.tracks && remoteTrackRows.length) {
                    await supabaseRequestWithTableFallback(
                        '/rest/v1/tracks',
                        {
                            method: 'POST',
                            headers: { Prefer: 'resolution=merge-duplicates,return=representation' },
                            body: JSON.stringify(remoteTrackRows)
                        },
                        'tracks',
                        null
                    );
                }
                if (supabaseTablesAvailable.tracks) {
                    bootstrapState.tracks = true;
                }

                if (!bootstrapState.artists && supabaseTablesAvailable.artists) {
                    const remoteArtistRows = artists
                        .filter((artist) => artist && artist.id && artist.name)
                        .map((artist) => {
                            const remoteId = toRemoteArtistId(artist.id);
                            if (!remoteId) return null;

                            return {
                                id: remoteId,
                                name: String(artist.name || ''),
                                photo: String(artist.photo || DEFAULT_CUSTOM_COVER)
                            };
                        })
                        .filter(Boolean);

                    if (remoteArtistRows.length) {
                        await supabaseRequestWithTableFallback(
                            '/rest/v1/artists',
                            {
                                method: 'POST',
                                headers: { Prefer: 'resolution=merge-duplicates,return=representation' },
                                body: JSON.stringify(remoteArtistRows)
                            },
                            'artists',
                            null
                        );
                    }
                }
                if (supabaseTablesAvailable.artists) {
                    bootstrapState.artists = true;
                }

                if (!bootstrapState.artistTracks && supabaseTablesAvailable.artists && supabaseTablesAvailable.artist_tracks) {
                    const trackByNormalizedTitle = new Map();
                    songs.forEach((song) => {
                        if (!song || !song.id || !song.title) return;
                        const key = normalizeName(song.title);
                        if (!key || trackByNormalizedTitle.has(key)) return;
                        const remoteId = toRemoteTrackId(song.id);
                        if (!remoteId) return;
                        trackByNormalizedTitle.set(key, remoteId);
                    });

                    const remoteLinks = [];
                    for (const artist of artists) {
                        if (!artist || !artist.id) continue;
                        const remoteArtistId = toRemoteArtistId(artist.id);
                        if (!remoteArtistId) continue;

                        await supabaseRequestWithTableFallback(
                            '/rest/v1/artist_tracks?artist_id=eq.' + encodeURIComponent(remoteArtistId),
                            { method: 'DELETE' },
                            'artist_tracks',
                            null
                        );

                        const localTitles = Array.isArray(artist.popularSongs) ? artist.popularSongs : [];
                        localTitles.forEach((title) => {
                            const remoteTrackId = trackByNormalizedTitle.get(normalizeName(title));
                            if (!remoteTrackId) return;
                            remoteLinks.push({ artist_id: remoteArtistId, track_id: remoteTrackId });
                        });
                    }

                    if (remoteLinks.length && supabaseTablesAvailable.artist_tracks) {
                        await supabaseRequestWithTableFallback(
                            '/rest/v1/artist_tracks',
                            {
                                method: 'POST',
                                headers: { Prefer: 'resolution=merge-duplicates,return=representation' },
                                body: JSON.stringify(remoteLinks)
                            },
                            'artist_tracks',
                            null
                        );
                    }
                }
                if (supabaseTablesAvailable.artists && supabaseTablesAvailable.artist_tracks) {
                    bootstrapState.artistTracks = true;
                }

            function loadTrackPlayCounts() {

                    if (!parsed || typeof parsed !== 'object') return {};

                    const sanitized = {};
                    Object.keys(parsed).forEach((trackId) => {
                        const count = Number(parsed[trackId]);
                        if (Number.isFinite(count) && count >= 0) {
                            sanitized[String(trackId)] = Math.floor(count);
                        }
                    });
                    return sanitized;
                } catch (error) {
                    return {};
                }
            }

            function ensureTrackPlayCount(trackId, fallback = 0) {
                const id = String(trackId || '');
                if (!id) return 0;
                if (typeof trackPlayCounts[id] === 'number') return trackPlayCounts[id];

                const normalizedFallback = Math.max(0, Math.floor(Number(fallback) || 0));
                trackPlayCounts[id] = normalizedFallback;
                return normalizedFallback;
            }

            function syncTrackPlayCountsWithSongs() {
                let changed = false;
                songs.forEach((song) => {
                    const existing = trackPlayCounts[song.id];
                    if (typeof existing !== 'number') {
                        trackPlayCounts[song.id] = Math.max(0, Math.floor(Number(song.plays) || 0));
                        changed = true;
                    }
                    song.plays = trackPlayCounts[song.id];
                });
                if (changed) {
                    persistTrackPlayCounts();
                }
            }

            function getTrackPlayCount(trackId) {
                const id = String(trackId || '');
                if (!id) return 0;
                if (typeof trackPlayCounts[id] === 'number') return trackPlayCounts[id];

                const track = songs.find((song) => song.id === id);
                return ensureTrackPlayCount(id, track?.plays || 0);
            }

            function formatPlayCount(value) {
                return new Intl.NumberFormat('ru-RU').format(Math.max(0, Math.floor(Number(value) || 0)));
            }

            function getArtistNamesFromTrackText(artistText) {
                return String(artistText || '')
                    .split(/,| feat\.? | ft\.? |&/gi)
                    .map((name) => normalizeName(name))
                    .filter(Boolean);
            }

            function getArtistMonthlyListeners(artistName) {
                const target = normalizeName(artistName);
                if (!target) return 0;

                return songs.reduce((sum, song) => {
                    const names = getArtistNamesFromTrackText(song.artist);
                    if (!names.includes(target)) return sum;
                    return sum + getTrackPlayCount(song.id);
                }, 0);
            }

            function incrementTrackPlayCount(trackId) {
                const id = String(trackId || '');
                if (!id) return;

                const nextValue = getTrackPlayCount(id) + 1;
                trackPlayCounts[id] = nextValue;

                const track = songs.find((song) => song.id === id);
                if (track) {
                    track.plays = nextValue;
                }

                if (currentTrackId === id) {
                    drawerPlaysCount.textContent = `${formatPlayCount(nextValue)} прослушиваний`;
                }

                persistTrackPlayCounts();
            }

            async function incrementTrackPlayCountOnline(trackId) {
                const id = String(trackId || '');
                if (!id) return;

                // Non-UUID built-in tracks stay local until they are migrated into Supabase.
                if (!isUuid(id)) {
                    incrementTrackPlayCount(id);
                    return;
                }

                const track = songs.find(s => s.id === id);
                const isUserUpload = track && track.isUserUpload;
                const tableName = isUserUpload ? 'user_uploads' : 'tracks';

                try {
                    const payload = await supabaseRequest('/rest/v1/rpc/increment_track_plays', {
                        method: 'POST',
                        body: JSON.stringify({ input_track_id: id })
                    });

                    const row = Array.isArray(payload) ? payload[0] : null;
                    const serverValue = Number(row && row.plays);
                    if (Number.isFinite(serverValue)) {
                        trackPlayCounts[id] = Math.max(0, Math.floor(serverValue));
                    } else {
                        // If RPC payload shape differs, keep optimistic increment.
                        incrementTrackPlayCount(id);
                        return;
                    }

                    if (track) {
                        track.plays = trackPlayCounts[id];
                    }

                    if (currentTrackId === id) {
                        drawerPlaysCount.textContent = `${formatPlayCount(trackPlayCounts[id])} прослушиваний`;
                    }

                    persistTrackPlayCounts();
                } catch (error) {
                    // Fallback for projects where RPC is missing or not yet updated.
                    try {
                        const currentValue = getTrackPlayCount(id);
                        const updatedRows = await supabaseRequest(
                            '/' + 'rest/v1/' + tableName + '?id=eq.' + encodeURIComponent(id) + '&select=id,plays',
                            {
                                method: 'PATCH',
                                headers: { Prefer: 'return=representation' },
                                body: JSON.stringify({ plays: currentValue + 1 })
                            }
                        );

                        const row = Array.isArray(updatedRows) ? updatedRows[0] : null;
                        const nextPlays = Number(row && row.plays);
                        if (Number.isFinite(nextPlays)) {
                            trackPlayCounts[id] = Math.max(0, Math.floor(nextPlays));
                            const updatedTrack = songs.find(s => s.id === id);
                            if (updatedTrack) {
                                updatedTrack.plays = trackPlayCounts[id];
                            }

                            if (currentTrackId === id) {
                                drawerPlaysCount.textContent = `${formatPlayCount(trackPlayCounts[id])} прослушиваний`;
                            }

                            persistTrackPlayCounts();
                            return;
                        }
                    } catch (fallbackError) {
                        // Ignore and use local optimistic increment below.
                    }

                    // Keep UX responsive even if online increment fails.
                    incrementTrackPlayCount(id);
                }
            }

            function maybeCountCurrentTrackPlay(force = false) {
                if (!currentTrackId || currentPlaybackCounted) return;

                const reachedThreshold = listenedSecondsThisSession >= LISTEN_COUNT_THRESHOLD_SECONDS;

            function getTrackSection(track) {
                if (!track) return 'trending';
                // uploads stored in their own table should always live in user section
                if (track.isUserUpload) return 'user';
                const override = sectionOverrides[track.id];
                if (override === 'user' || override === 'trending' || override === 'unlisted') return override;
                if (track.isUnlisted) return 'unlisted';
                return track.isCustom ? 'user' : 'trending';

                        initRecommendationOrder();
                    });
                } catch (error) {

            }

            async function hydrateFromSupabase() {
                try {
                    const remoteTracks = await supabaseRequestWithTableFallback(
                        '/rest/v1/tracks?select=id,title,artist_name,cover,src,lyrics,plays,section,is_hidden&order=created_at.asc',
                        { method: 'GET' },
                        'tracks',
                        []
                    );
                    const remoteUserUploads = await supabaseRequestWithTableFallback(
                        '/rest/v1/user_uploads?select=id,title,artist_name,cover,src,lyrics,plays,is_hidden,is_unlisted,uploader_id&order=created_at.asc',
                        { method: 'GET' },
                        'user_uploads',
                        []
                    );
                    const remoteArtists = await supabaseRequestWithTableFallback(
                        '/rest/v1/artists?select=id,name,photo&order=created_at.asc',
                        { method: 'GET' },
                        'artists',
                        []
                    );
                    const remoteLinks = await supabaseRequestWithTableFallback(
                        '/rest/v1/artist_tracks?select=artist_id,track_id',
                        { method: 'GET' },
                        'artist_tracks',
                        []
                    );

                    const remoteTrackRows = Array.isArray(remoteTracks) ? remoteTracks : [];
                    const remoteUserUploadRows = Array.isArray(remoteUserUploads) ? remoteUserUploads : [];
                    const remoteArtistRows = Array.isArray(remoteArtists) ? remoteArtists : [];
                    const remoteLinkRows = Array.isArray(remoteLinks) ? remoteLinks : [];

                    if (!remoteTrackRows.length && !remoteArtistRows.length && !remoteUserUploadRows.length) {
                        return;
                    }

                    const remoteTracksById = new Map();
                    remoteTrackRows.forEach((row) => {
                        if (!row || !row.id || !row.title || !row.artist_name || !row.src) return;

                        const song = {
                            id: String(row.id),
                            title: String(row.title),
                            artist: String(row.artist_name),
                            cover: String(row.cover || DEFAULT_CUSTOM_COVER),
                            plays: Number(row.plays || 0),
                            src: String(row.src),
                            lyrics: String(row.lyrics || ''),
                            isAdminAdded: true,
                            isCustom: isTrackFromSupabaseStorage(row.src),
                            // treat any Supabase-origin track as public upload so it stays in userMusic section
                            isPublicUpload: isTrackFromSupabaseStorage(row.src),
                            uploaderId: String(row.uploader_id || '')
                        };

                        // remember for later artist linking and potential duplicate detection
                        remoteTracksById.set(song.id, song);

                        // add to main song list if not already present
                        if (!songs.some(s => s.id === song.id)) {
                            songs.push(song);
                        }

                        sectionOverrides[song.id] = row.section === 'user' ? 'user' : row.section === 'unlisted' ? 'unlisted' : 'trending';
                        if (row.is_hidden) hiddenSongIds.add(song.id);
                        if (!row.is_hidden) hiddenSongIds.delete(song.id);
                        ensureTrackPlayCount(song.id, song.plays || 0);
                    });

                    // incorporate user uploads fetched from their own table
                    remoteUserUploadRows.forEach((row) => {
                        if (!row || !row.id || !row.title || !row.artist_name || !row.src) return;

                        const song = {
                            id: String(row.id),
                            title: String(row.title),
                            artist: String(row.artist_name),
                            cover: String(row.cover || DEFAULT_CUSTOM_COVER),
                            plays: Number(row.plays || 0),
                            src: String(row.src),
                            lyrics: String(row.lyrics || ''),
                            isCustom: true,
                            isUserUpload: true,
                            isPublicUpload: true,
                            isUnlisted: Boolean(row.is_unlisted),
                            uploaderId: String(row.uploader_id || '')
                        };
                        if (!songs.some(s => s.id === song.id)) {
                            songs.push(song);
                        }
                        if (row.is_hidden) hiddenSongIds.add(song.id);
                        if (!row.is_hidden) hiddenSongIds.delete(song.id);
                        ensureTrackPlayCount(song.id, song.plays || 0);
                    });

                    const linksByArtist = new Map();
                    remoteLinkRows.forEach((row) => {
                        const artistId = String(row.artist_id || '');
                        const trackId = String(row.track_id || '');
                        if (!artistId || !trackId) return;
                        if (!linksByArtist.has(artistId)) linksByArtist.set(artistId, []);
                        linksByArtist.get(artistId).push(trackId);
                    });

                    if (remoteArtistRows.length) {
                        const nextArtists = remoteArtistRows.map((row, index) => {
                            const artistId = String(row.id || `a-remote-${index + 1}`);
                            const linkedTrackIds = linksByArtist.get(artistId) || [];
                            let popularSongs = linkedTrackIds
                                .map((trackId) => remoteTracksById.get(trackId) || songs.find((song) => song.id === trackId))
                                .filter(Boolean)
                                .map((track) => track.title);

                            if (!popularSongs.length) {
                                const artistName = String(row.name || '').trim().toLowerCase();
                                popularSongs = songs
                                    .filter((track) => String(track.artist || '').toLowerCase().includes(artistName))
                                    .slice(0, 3)
                                    .map((track) => track.title);
                            }

                            return {
                                id: artistId,
                                name: String(row.name || `Artist ${index + 1}`),
                                photo: String(row.photo || DEFAULT_CUSTOM_COVER),
                                albums: [],
                                popularSongs
                            };
                        });

                        if (nextArtists.length) {
                            artists.splice(0, artists.length, ...nextArtists);
                        }
                    }

                    persistSectionOverrides();
                    persistHiddenSongIds();
                    persistArtistsState();
                    persistAdminAddedSongs();
                    persistAdminSongCatalog();
                } catch (error) {
                    // keep local data when Supabase is temporarily unavailable
                }
            }

            async function refreshRemotePlayCounts() {
                if (!supabaseTablesAvailable.tracks && !supabaseTablesAvailable.userUploads) return;

                try {
                    let allRows = [];
                    if (supabaseTablesAvailable.tracks) {
                        const rows = await supabaseRequest('/rest/v1/tracks?select=id,plays', { method: 'GET' });
                        if (Array.isArray(rows)) allRows = allRows.concat(rows);
                    }
                    if (supabaseTablesAvailable.userUploads) {
                        const rows = await supabaseRequest('/rest/v1/user_uploads?select=id,plays', { method: 'GET' });
                        if (Array.isArray(rows)) allRows = allRows.concat(rows);
                    }
                    if (!allRows.length) return;

                    let changed = false;
                    allRows.forEach((row) => {
                        const id = String(row.id || '');
                        if (!id) return;
                        const plays = Math.max(0, Math.floor(Number(row.plays) || 0));
                        if (trackPlayCounts[id] !== plays) {
                            trackPlayCounts[id] = plays;
                            changed = true;
                        }

                        const track = songs.find((item) => item.id === id);
                        if (track && track.plays !== plays) {
                            track.plays = plays;
                            changed = true;
                        }
                    });

                    if (!changed) return;

                    if (currentTrackId && typeof trackPlayCounts[currentTrackId] === 'number') {
                        drawerPlaysCount.textContent = `${formatPlayCount(trackPlayCounts[currentTrackId])} прослушиваний`;
                    }

                    persistTrackPlayCounts();
                    const currentFilter = searchInput.value || '';
                    if (currentFilter) {
                        showSearchResults(currentFilter);
                    } else {
                        renderSongs();
                    }
                    renderLikedSongs(currentFilter);
                    renderUserSongs(currentFilter);
                    renderChartSongs();
                    renderUserMusic(currentFilter);
                    renderArtists(currentFilter);
                } catch (error) {
                    if (isMissingTableError(error, 'tracks')) {
                        supabaseTablesAvailable.tracks = false;
                    }
                    // ignore temporary sync errors
                }
            }

            function appendCustomTracksToSongs() {
                try {
                    const raw = localStorage.getItem(CUSTOM_TRACKS_STORAGE_KEY);
                    if (!raw) return;
                    const parsed = JSON.parse(raw);

            function openCustomTracksDb() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(CUSTOM_TRACKS_DB_NAME, CUSTOM_TRACKS_DB_VERSION);

                    request.onupgradeneeded = () => {
                        const db = request.result;
                        if (!db.objectStoreNames.contains(CUSTOM_TRACKS_DB_STORE)) {
                            db.createObjectStore(CUSTOM_TRACKS_DB_STORE, { keyPath: 'id' });
                        }
                    };

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error || new Error('IndexedDB is not available'));
                });
            }

            function idbRequestToPromise(request) {
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error || new Error('IndexedDB request failed'));
                });
            }

            async function saveCustomTrackToDb(trackRecord) {
                const db = await openCustomTracksDb();
                try {
                    const tx = db.transaction(CUSTOM_TRACKS_DB_STORE, 'readwrite');
                    const store = tx.objectStore(CUSTOM_TRACKS_DB_STORE);
                    await idbRequestToPromise(store.put(trackRecord));
                } finally {
                    db.close();
                }
            }

            async function deleteCustomTrackFromDb(trackId) {
                const db = await openCustomTracksDb();
                try {
                    const tx = db.transaction(CUSTOM_TRACKS_DB_STORE, 'readwrite');
                    const store = tx.objectStore(CUSTOM_TRACKS_DB_STORE);
                    await idbRequestToPromise(store.delete(trackId));
                } finally {
                    db.close();
                }
            }

            async function loadCustomTracksFromDb() {
                const db = await openCustomTracksDb();
                try {
                    const tx = db.transaction(CUSTOM_TRACKS_DB_STORE, 'readonly');
                    const store = tx.objectStore(CUSTOM_TRACKS_DB_STORE);
                    const records = await idbRequestToPromise(store.getAll());
                    return Array.isArray(records) ? records : [];
                } finally {
                    db.close();
                }
            }

            async function hydrateCustomTracksFromDb() {
                try {
                    const records = await loadCustomTracksFromDb();
                    records.forEach((record) => {
                        if (!record || !record.id || !record.title || !record.artist || !record.audioBlob) return;

                        const src = URL.createObjectURL(record.audioBlob);
                        const cover = record.coverBlob
                            ? URL.createObjectURL(record.coverBlob)
                            : DEFAULT_CUSTOM_COVER;

                        addCustomTrackToSongs({
                            id: record.id,
                            title: record.title,
                            artist: record.artist,
                            plays: Number(record.plays || 0),
                            lyrics: String(record.lyrics || ''),
                            src,
                            cover,
                            isPublicUpload: Boolean(record.isPublicUpload),
                            isUnlisted: Boolean(record.isUnlisted),
                            uploaderId: String(record.uploaderId || '')
                        });
                    });
                } catch (error) {
                    // keep app usable even if IndexedDB is unavailable
                }
            }

            async function migrateLegacyCustomTracksToDb() {
                try {
                    const raw = localStorage.getItem(CUSTOM_TRACKS_STORAGE_KEY);
                    if (!raw) return;
                    const parsed = JSON.parse(raw);
                    if (!Array.isArray(parsed) || !parsed.length) {
                        localStorage.removeItem(CUSTOM_TRACKS_STORAGE_KEY);
                        return;
                    }

                    // Legacy payload stores data URLs in localStorage and may exceed quota; move it once to IndexedDB.
                    for (const track of parsed) {
                        if (!track || !track.id || !track.title || !track.artist || !track.src) continue;
                        if (typeof track.src !== 'string' || !track.src.startsWith('data:')) continue;

                        const audioBlob = await fetch(track.src).then((r) => r.blob());
                        let coverBlob = null;
                        if (typeof track.cover === 'string' && track.cover.startsWith('data:')) {
                            coverBlob = await fetch(track.cover).then((r) => r.blob());
                        }

                        await saveCustomTrackToDb({
                            id: String(track.id),
                            title: String(track.title),
                            artist: String(track.artist),
                            plays: Number(track.plays || 0),
                            lyrics: String(track.lyrics || ''),
                            audioBlob,
                            coverBlob
                        });
                    }

                    localStorage.removeItem(CUSTOM_TRACKS_STORAGE_KEY);
                } catch (error) {
                    // keep legacy data as fallback if migration fails
                }
            }

            function setupLyricsForTrack(track) {
                drawerLyrics.textContent = track.lyrics || 'Текст песни пока не добавлен';
                drawerLyrics.scrollTop = 0;
                lyricsScrollOffset = 0;
                if (isAutoLyricsEnabled) {
                    startLyricsAutoScroll(true);
                }
            }

            function updateAutoScrollButtonState() {
                drawerAutoScrollBtn.classList.toggle('active', isAutoLyricsEnabled);
            }

            function getBaseLyricsScrollTarget() {
                if (!audio.duration || !Number.isFinite(audio.duration)) return null;
                const maxScrollTop = drawerLyrics.scrollHeight - drawerLyrics.clientHeight;
                if (maxScrollTop <= 0) return null;

                const progress = Math.min(1, Math.max(0, (audio.currentTime / audio.duration) * AUTO_LYRICS_SPEED));
                return maxScrollTop * progress;
            }

            function getLyricsScrollTarget() {
                const base = getBaseLyricsScrollTarget();
                if (base === null) return null;
                const maxScrollTop = drawerLyrics.scrollHeight - drawerLyrics.clientHeight;
                return Math.max(0, Math.min(maxScrollTop, base + lyricsScrollOffset));
            }

            function stopLyricsAutoScroll() {
                if (!autoLyricsRafId) return;
                cancelAnimationFrame(autoLyricsRafId);
                autoLyricsRafId = null;
            }

            function runLyricsAutoScroll() {
                if (!isAutoLyricsEnabled) {
                    autoLyricsRafId = null;
                    return;
                }

                // stop auto-scroll if audio paused/ended
                if (audio.paused || audio.ended) {
                    isAutoLyricsEnabled = false;
                    updateAutoScrollButtonState();
                    stopLyricsAutoScroll();
                    return;
                }

                const target = getLyricsScrollTarget();
                if (target !== null) {
                    const maxScrollTop = drawerLyrics.scrollHeight - drawerLyrics.clientHeight;
                    const diff = target - drawerLyrics.scrollTop;
                    isAutoUpdatingLyricsScroll = true;
                    drawerLyrics.scrollTop += diff * 0.2;
                    isAutoUpdatingLyricsScroll = false;

                    // Если достигли почти низа — останавливаем автопрокрутку автоматически
                    if (drawerLyrics.scrollTop >= Math.max(0, maxScrollTop - 1)) {
                        isAutoLyricsEnabled = false;
                        updateAutoScrollButtonState();
                        stopLyricsAutoScroll();
                        return;
                    }
                }

                autoLyricsRafId = requestAnimationFrame(runLyricsAutoScroll);
            }

            function startLyricsAutoScroll(forceSnap = false) {
                if (!isAutoLyricsEnabled) return;
                const target = getLyricsScrollTarget();
                if (forceSnap && target !== null) {
                    drawerLyrics.scrollTop = target;
                }

                if (!autoLyricsRafId) {
                    autoLyricsRafId = requestAnimationFrame(runLyricsAutoScroll);
                }
            }

            function toggleLyricsAutoScroll() {
                isAutoLyricsEnabled = !isAutoLyricsEnabled;
                updateAutoScrollButtonState();
                if (isAutoLyricsEnabled) {
                    startLyricsAutoScroll(true);
                } else {
                    stopLyricsAutoScroll();
                }
            }

            function enableMouseDragScroll(container) {
                let isDragging = false;
                let startX = 0;
                let previousX = 0;
                let suppressClick = false;
                let velocity = 0;
                let lastMoveTime = 0;
                let momentumFrame = null;

                const stopMomentum = () => {
                    if (momentumFrame) {
                        cancelAnimationFrame(momentumFrame);
                        momentumFrame = null;
                    }
                };

                const runMomentum = () => {
                    if (Math.abs(velocity) < 0.02) {
                        momentumFrame = null;
                        return;
                    }

                    container.scrollLeft -= velocity * 16;
                    velocity *= 0.92;
                    momentumFrame = requestAnimationFrame(runMomentum);
                };

                const handleMove = (e) => {
                    if (!isDragging) return;

                    const now = performance.now();
                    const currentX = e.clientX;
                    const deltaX = currentX - previousX;
                    const deltaTime = Math.max(now - lastMoveTime, 1);

                    if (Math.abs(currentX - startX) > 4) {
                        suppressClick = true;
                    }

                    container.scrollLeft -= deltaX;
                    velocity = deltaX / deltaTime;
                    previousX = currentX;
                    lastMoveTime = now;
                    e.preventDefault();
                };

                const stopDragging = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    container.classList.remove('is-dragging');
                    container.style.scrollBehavior = '';

                    if (Math.abs(velocity) > 0.05) {
                        stopMomentum();
                        momentumFrame = requestAnimationFrame(runMomentum);
                    }
                };

                container.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    e.preventDefault();
                    stopMomentum();
                    isDragging = true;
                    suppressClick = false;
                    startX = e.clientX;
                    previousX = e.clientX;
                    velocity = 0;
                    lastMoveTime = performance.now();
                    container.style.scrollBehavior = 'auto';
                    container.classList.add('is-dragging');
                });

                container.addEventListener('dragstart', (e) => e.preventDefault());
                container.addEventListener('wheel', (e) => {
                    if (window.innerWidth < 1024) return;

                    const maxScroll = container.scrollWidth - container.clientWidth;
                    if (maxScroll <= 0) return;

                    const rawDelta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
                    if (rawDelta === 0) return;

                    let delta = rawDelta;
                    if (e.deltaMode === 1) {
                        delta *= 16;
                    } else if (e.deltaMode === 2) {
                        delta *= window.innerHeight;
                    }

                    container.scrollLeft += delta * 0.9;
                    e.preventDefault();
                }, { passive: false });
                window.addEventListener('mousemove', handleMove, { passive: false });
                document.addEventListener('mouseup', stopDragging);
                window.addEventListener('blur', stopDragging);

                container.addEventListener('click', (e) => {
                    if (!suppressClick) return;
                    e.preventDefault();
                    e.stopPropagation();
                    suppressClick = false;
                }, true);
            }

            enableMouseDragScroll(recommendationsGrid);
            enableMouseDragScroll(popularArtistsGrid);
            enableMouseDragScroll(likedSongsGrid);
            enableMouseDragScroll(userSongsGrid);
            enableMouseDragScroll(userMusicGrid);
            enableMouseDragScroll(searchSongsGrid);
            enableMouseDragScroll(searchArtistsGrid);

            desktopScrollButtons.forEach((button) => {
                button.addEventListener('click', () => {
                    const targetId = button.dataset.scrollTarget;
                    const direction = button.dataset.direction;
                    const container = document.getElementById(targetId);
                    if (!container) return;

                    const firstCard = container.querySelector('.song-card, .artist-card');
                    const cardWidth = firstCard ? firstCard.getBoundingClientRect().width : 210;
                    const styles = window.getComputedStyle(container);
                    const gap = parseFloat(styles.columnGap || styles.gap || '20') || 20;
                    const step = cardWidth + gap;
                    const offset = direction === 'prev' ? -step : step;

                    container.scrollBy({ left: offset, behavior: 'smooth' });
                });
            });

            // Рендер
            function renderSongs(filter = '') {
                const normalized = filter.toLowerCase();
                let filtered = songs.filter(s =>
                    (filter ? true : isTrackRecommended(s)) &&
                    (s.title.toLowerCase().includes(normalized) || s.artist.toLowerCase().includes(normalized))
                );

                if (!filter) {
                    // display everything in the current recommendationOrder sequence
                    filtered.sort((a, b) => {
                        const ia = recommendationOrder.indexOf(a.id);
                        const ib = recommendationOrder.indexOf(b.id);
                        return ia - ib;
                    });
                }

                recommendationsGrid.innerHTML = filtered.map(s => `
                    <div class="song-card" data-track-id="${s.id}">
                        <img src="${s.cover}" loading="lazy">
                        <h4>${s.title}</h4>
                        <p>${s.artist}</p>
                    </div>
                `).join('');
                attachTrackCardListeners(recommendationsGrid, filtered.map(s => s.id), 'recommendations');
            }

            function renderChartSongs() {
                const top10 = songs
                    .sort((a, b) => getTrackPlayCount(b.id) - getTrackPlayCount(a.id))
                    .slice(0, 10);
                const left = top10.slice(0, 5);
                const right = top10.slice(5, 10);

                                <img src="${s.cover}" class="chart-cover" loading="lazy">

            function attachChartListeners(container, queueIds, sectionId) {
                container.querySelectorAll('.chart-item').forEach(item => {

            function attachTrackCardListeners(container, queueIds, sectionId) {

            function renderLikedSongs(filter = '') {
                const likedTracks = [...likedTrackIds]
                    .map(id => getTrackById(id))
                    .filter(track => track && !hiddenSongIds.has(track.id));

                const filtered = likedTracks.filter(s =>
                    s.title.toLowerCase().includes(filter.toLowerCase()) ||
                    s.artist.toLowerCase().includes(filter.toLowerCase())
                );

                if (!filtered.length) {
                    likedSongsGrid.innerHTML = '<div class="liked-empty">Пока пусто. Нажми сердечко у трека, чтобы добавить сюда.</div>';

                likedSongsGrid.innerHTML = filtered.map(s => `
                    <div class="song-card" data-track-id="${s.id}">
